function hiddenWordsPattern(text,minCount=3){
  const words=stripHtml(text).split(/\s+/).filter(Boolean);
  const count=Math.max(words.length,minCount);
  return Array.from({length:count},(_,i)=>i%3===2?'••••••':'••••').join(' ');
}
function hiddenPagePattern(){return hiddenWordsPattern('',120);}

function render(){
  applyTheme();
  if(S.screen==='more'){
    S.moreScrollY=window.scrollY;
    S.openJuzs=new Set([...document.querySelectorAll('.juz-details[open]')].map(el=>parseInt(el.querySelector('.juz-summary-num').textContent.replace('Juz ',''))));
  }
  const app=document.getElementById('app');
  const due=getDue(S.cards,S.pages);
  const t=today();

  // HOME
  if(S.screen==='home'){
    const upcomingByDate=getUpcomingByDate();
    const futureDates=Object.keys(upcomingByDate).filter(d=>d>t).sort().slice(0,3);

    app.innerHTML=`<div class="top-bar home-top-bar"><h1>QuranKi</h1><button class="top-btn" onclick="goMore()"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="2" y1="5" x2="18" y2="5"/><line x1="2" y1="10" x2="18" y2="10"/><line x1="2" y1="15" x2="18" y2="15"/><circle cx="7" cy="5" r="2.2" fill="var(--bg)"/><circle cx="13" cy="10" r="2.2" fill="var(--bg)"/><circle cx="8" cy="15" r="2.2" fill="var(--bg)"/></svg></button></div>
      <div class="home-content">
        ${due.length?`<section class="section-block">
          <p class="label">Due today</p>
          ${renderDueOverview(due)}
        </section>`:''}
        ${futureDates.length?`<section class="section-block"><p class="label">Coming up</p>
          ${renderUpcomingList(futureDates,upcomingByDate,t)}</section>`:''}
      </div>
      ${due.length?`<div class="home-footer"><button class="btn btn-primary" onclick="startRating()">Start revision</button></div>`:''}` ;
    return;
  }

  // MORE — unified surah list (add + manage) + settings
  if(S.screen==='more'){
    const{forgotDays,struggledDays,easyDays,darkMode}=S.settings;
    const groups=surahsByJuz(),juzNums=Object.keys(groups).map(Number).sort((a,b)=>a-b);
    function surahRowHtml(s,juz){
      const sp=getSurahPagesInJuz(s,juz);
      const isCompact=isSurahCard(s);
      const allMem=sp.filter(p=>isSurahPageSelected(s,p));
      const isMemorized=allMem.length>0||(isCompact&&S.surahCards[s]&&!S.removedSurahs.has(s));
      const isFullyMemorized=isCompact?isWholeSurahMemorized(s)&&S.surahCards[s]&&!S.removedSurahs.has(s):allMem.length===sp.length;
      const isExpanded=S.expandedSurah===surahJuzKey(s,juz);
      const left=`<div class="surah-row-left"><span class="surah-row-num">${s}</span><span class="surah-row-title"><span class="surah-row-name">${SURAH_NAMES[s]}</span></span></div>`;

      let row='';
      if(!isMemorized)
        row=`<div class="surah-row tappable${isExpanded?' expanded':''}" onclick="openSurah(${s},${juz})">${left}<span class="surah-progress">${pageCountLabel(sp.length)}</span></div>`;
      else if(!isFullyMemorized)
        row=`<div class="surah-row tappable${isExpanded?' expanded':''}" onclick="openSurah(${s},${juz})">${left}<span class="surah-progress partial">${allMem.length} / ${pageCountLabel(sp.length)} ›</span></div>`;
      else if(isCompact){
        if(S.retiredSurahs.has(s))
          row=`<div class="surah-row milestone-row tappable${isExpanded?' expanded':''}" onclick="openSurah(${s},${juz})">${left}<div class="page-meta"><span class="restore-btn" onclick="event.stopPropagation();unretireSurah(${s})">restore</span></div></div>`;
        else{
          const d=S.surahCards[s]?.due;
          const st=d&&d<=t?`<span class="page-due-now">Due</span>`:`<span class="surah-progress done">✓</span>`;
          const removeAction=isShortSurah(s)?`removeShortSurah(${s})`:`removeAllSurahPages(${s})`;
          row=`<div class="surah-row tappable${isExpanded?' expanded':''}" onclick="openSurah(${s},${juz})">${left}<div class="page-meta">${st}<span class="master-btn" onclick="event.stopPropagation();retireSurah(${s})">Master</span><span class="delete-btn" onclick="event.stopPropagation();${removeAction}">×</span></div></div>`;
        }
      } else {
        const allRetired=allMem.every(p=>S.retired.has(p));
        if(allRetired)
          row=`<div class="surah-row milestone-row tappable${isExpanded?' expanded':''}" onclick="openSurah(${s},${juz})">${left}<div class="page-meta"><span class="restore-btn" onclick="event.stopPropagation();allMem.forEach(p=>unretirePage(p))">restore</span></div></div>`;
        else{
          const anyDue=allMem.some(p=>S.cards[p]?.due<=t);
          const st=anyDue?`<span class="page-due-now">Due</span>`:`<span class="surah-progress done">✓</span>`;
          row=`<div class="surah-row tappable${isExpanded?' expanded':''}" onclick="openSurah(${s},${juz})">${left}<div class="page-meta">${st}<span class="master-btn" onclick="event.stopPropagation();retireAllSurahPages(${s})">Master</span><span class="delete-btn" onclick="event.stopPropagation();removeAllSurahPages(${s})">×</span></div></div>`;
        }
      }

      if(!isExpanded) return row;

      const picker=`<div class="inline-picker">
        <ul class="page-list">${sp.map(p=>{
          const c=isSurahPageSelected(s,p);
          const v=getPageVerse(p,s);
          return`<li class="pick-item${c?' checked':''}" onclick="togglePage(${p},${s})"><span class="pick-num">${p}</span><span class="pick-verse">${escapeHtml(v||'')}</span><span class="pick-check">${c?'✓':''}</span></li>`;
        }).join('')}</ul>
      </div>`;
      return row+picker;
    }
    const surahRows=juzNums.map(juz=>{
      const juzSurahs=groups[juz];
      const {start:juzStart,end:juzEnd}=juzPageRange(juz);
      const totalJuzPages=juzEnd-juzStart+1;
      const memJuzPages=selectedJuzPages(juz).length;
      const masteredJuz=isJuzMastered(juz);
      const hint=memJuzPages>0?`${memJuzPages}/${totalJuzPages} pages`:`${totalJuzPages} pages`;
      const hintClass='juz-summary-surahs';
      const rowsHtml=juzSurahs.map(s=>surahRowHtml(s,juz)).join('');
      return`<details class="juz-details${masteredJuz?' milestone-juz':''}"${S.openJuzs.has(juz)?' open':''} ontoggle="toggleJuzOpen(${juz},this.open)"><summary class="juz-summary"><span class="juz-summary-num">Juz ${juz}</span><div class="juz-summary-right"><span class="${hintClass}">${hint}</span><span class="juz-summary-arrow">›</span></div></summary><div class="juz-details-body">${rowsHtml}</div></details>`;
    }).join('');
    app.innerHTML=`<button class="back-btn fixed-back-btn" onclick="goHome()"><svg width="9" height="16" viewBox="0 0 9 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1L1 8L8 15"/></svg></button>
      <div class="more-screen"><p class="section-title">Revision intervals</p>

      <div class="settings-card">
        <div class="setting-row"><span class="setting-label">Blank</span><div class="setting-right"><input class="days-input" type="number" inputmode="numeric" min="1" max="365" value="${forgotDays}" oninput="autoSaveSetting('forgotDays',this.value,this)"/><span class="setting-unit">${forgotDays===1?'day':'days'}</span></div></div>
        <div class="setting-row"><span class="setting-label">Aight</span><div class="setting-right"><input class="days-input" type="number" inputmode="numeric" min="1" max="365" value="${struggledDays}" oninput="autoSaveSetting('struggledDays',this.value,this)"/><span class="setting-unit">${struggledDays===1?'day':'days'}</span></div></div>
        <div class="setting-row"><span class="setting-label">Chill</span><div class="setting-right"><input class="days-input" type="number" inputmode="numeric" min="1" max="365" value="${easyDays}" oninput="autoSaveSetting('easyDays',this.value,this)"/><span class="setting-unit">${easyDays===1?'day':'days'}</span></div></div>
      </div>
      <p class="section-title" style="margin-top:32px">Appearance</p>
      <div class="settings-card">
        <div class="setting-row"><span class="setting-label">Dark mode</span><button class="theme-toggle${darkMode?' on':''}" onclick="toggleDarkMode()" aria-label="Toggle dark mode" aria-pressed="${darkMode?'true':'false'}"><span class="theme-toggle-knob"></span></button></div>
      </div>
      <p class="section-title" style="margin-top:48px">Surahs</p><div>${surahRows}</div>
      <span class="reset-link" onclick="hardReset()">reset all progress</span></div>`;
    requestAnimationFrame(()=>window.scrollTo(0,S.moreScrollY));
    return;
  }

  // RATING
  if(S.screen==='rating'){
    const item=S.ratingQueue[S.ratingIdx];
    const{page,surah}=item;
    const prog=S.ratingIdx+1,total=S.ratingQueue.length;
    const card=item.cardType==='surah'?(S.surahCards[surah]||{interval:0,ease:2.5,reps:0,due:today()}):S.cards[page];
    const preview=previewLabels(card,S.settings);
    const names=ratingNames();
    const promptHtml=reviewPageTextHtml(item);
    app.innerHTML=`<div class="rating-screen"><div class="top-bar rating-top"><button class="back-btn" onclick="exitRating()" aria-label="Exit revision"><svg width="9" height="16" viewBox="0 0 9 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1L1 8L8 15"/></svg></button><p class="progress-text" style="margin:0">${prog} / ${total}</p><span></span></div>
      <div class="rating-main">
        <div class="rating-surah-name">${escapeHtml(SURAH_NAMES_AR[surah]||SURAH_NAMES[surah])}</div>
        ${promptHtml}
      </div>
      <div class="rating-nav">
        <button class="rating-arrow" onclick="previousRating()" aria-label="Undo"${S.ratingIdx>0?'':' disabled'}><svg width="9" height="16" viewBox="0 0 9 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1L1 8L8 15"/></svg></button>
        <div class="rating-options">
          <button class="r-btn${S.pendingRating===1?' selected':''}" onclick="selectRating(1)"><span class="r-label">${escapeHtml(names[1])}</span><span class="r-when">${preview[1]}</span></button>
          <button class="r-btn${S.pendingRating===2?' selected':''}" onclick="selectRating(2)"><span class="r-label">${escapeHtml(names[2])}</span><span class="r-when">${preview[2]}</span></button>
          <button class="r-btn${S.pendingRating===3?' selected':''}" onclick="selectRating(3)"><span class="r-label">${escapeHtml(names[3])}</span><span class="r-when">${preview[3]}</span></button>
        </div>
        <button class="rating-arrow${S.pendingRating?' confirm':''}" onclick="nextRating()" aria-label="Confirm"${S.pendingRating?'':' disabled'}><svg width="9" height="16" viewBox="0 0 9 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1L8 8L1 15"/></svg></button>
      </div></div>`;
    return;
  }

  // DONE screen is intentionally skipped; finishing revision returns home automatically.
  if(S.screen==='done'){
    goHome();
    return;
  }
}

applyTheme();
render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js');
  });
}
</script>
</body>
</html>
