<html lang="en">

  <title>Muraja'ah</title>
  <style>
    :root {
      --bg:      #f5f1eb;   /* warm off-white — the main background */
      --surface: #ede9e2;   /* slightly darker warm, for inputs / ghost buttons */
      --ink:     #1c1814;   /* warm near-black for primary text */
      --ink-2:   #8a7f72;   /* warm mid-tone for secondary text */
      --ink-3:   #b8b0a5;   /* warm light for labels, dates */
      --line:    #e2ddd6;   /* dividers */
      --btn:     #1c1814;   /* primary button fill */
      --btn-txt: #f5f1eb;   /* primary button text */
      --modal-shade: rgba(28,24,20,0.35);
    }
    body.dark {
      --bg:      #17130f;
      --surface: #241f19;
      --ink:     #f2ece4;
      --ink-2:   #c5b8a9;
      --ink-3:   #817669;
      --line:    #332b23;
      --btn:     #f2ece4;
      --btn-txt: #17130f;
      --modal-shade: rgba(0,0,0,0.58);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      background: var(--bg); color: var(--ink); min-height: 100dvh;
      padding-top: max(32px, env(safe-area-inset-top, 32px));
      padding-bottom: max(64px, calc(env(safe-area-inset-bottom, 0px) + 40px));
      padding-left: max(20px, env(safe-area-inset-left, 20px));
      padding-right: max(20px, env(safe-area-inset-right, 20px));
      -webkit-tap-highlight-color: transparent; -webkit-text-size-adjust: 100%;
    }
    #app { max-width: 480px; margin: 0 auto; }

    /* ── Top bar ─────────────────────────────────────────────────── */
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .top-bar-right { display: flex; gap: 18px; }
    h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; color: var(--ink); }
    .top-btn {
      background: none; border: none; font-size: 15px; color: var(--ink-2);
      padding: 4px 0; cursor: pointer; touch-action: manipulation;
      -webkit-user-select: none; user-select: none;
      display: inline-flex; align-items: center; line-height: 1;
    }
    .top-btn:active { color: var(--ink); }
    .top-btn:disabled { opacity: 0.28; cursor: default; }
    .top-btn:disabled:active { color: var(--ink-2); }
    .back-btn {
      background: var(--surface); border: none; border-radius: 10px;
      font-size: 15px; font-weight: 500; color: var(--ink);
      min-width: 42px; min-height: 36px; padding: 9px 16px; cursor: pointer; touch-action: manipulation;
      -webkit-user-select: none; user-select: none;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .back-btn:active { opacity: 0.7; }
    .date { font-size: 13px; color: var(--ink-3); margin-top: 3px; margin-bottom: 28px; }

    /* ── Summary line ─────────────────────────────────────────────── */
    .summary { font-size: 15px; color: var(--ink-2); margin-bottom: 28px; }
    .summary strong { color: var(--ink); font-weight: 600; }

    /* ── Section label ────────────────────────────────────────────── */
    .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.4px; color: var(--ink-3); margin-bottom: 14px; }
    .section-title { font-size: 18px; font-weight: 600; color: var(--ink); margin-bottom: 16px; }

    /* ── Juz grouping (manage / select) ──────────────────────────── */
    .juz-block  { margin-bottom: 24px; }
    .juz-label  { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.6px; color: var(--ink-3); margin-bottom: 10px; }

    /* ── Collapsible Juz sections (more screen) ───────────────────── */
    .juz-details { border-bottom: 1px solid var(--line); }
    .juz-summary {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 0; cursor: pointer; list-style: none; -webkit-user-select: none; user-select: none;
    }
    .juz-summary::-webkit-details-marker { display: none; }
    .juz-summary-left { display: flex; align-items: center; gap: 10px; }
    .juz-summary-num { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.4px; color: var(--ink-3); }
    .juz-summary-surahs { font-size: 13px; color: var(--ink-3); }
    .juz-summary-arrow { font-size: 16px; color: var(--ink-3); transition: transform 0.2s; display: inline-block; }
    .juz-details[open] .juz-summary-arrow { transform: rotate(90deg); }
    .juz-details-body { padding-bottom: 8px; }
    .surah-block { margin-bottom: 10px; }
    .surah-label { font-size: 16px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
    .page-list { list-style: none; }

    /* ── Due overview rows ────────────────────────────────────────── */
    .juz-overview-card {
      padding: 16px 0; border-bottom: 1px solid var(--line);
      cursor: pointer; touch-action: manipulation;
    }
    .juz-overview-card:active { opacity: 0.45; }
    .juz-overview-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
    .juz-overview-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; color: var(--ink-3); }
    .juz-overview-count { font-size: 13px; color: var(--ink-3); }
    .juz-overview-surahs { font-size: 16px; color: var(--ink); line-height: 1.7; }

    /* ── Select mode list items ───────────────────────────────────── */
    .due-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 13px 0; border-bottom: 1px solid var(--line); min-height: 46px;
      cursor: pointer; touch-action: manipulation; list-style: none;
    }
    .due-item:active { opacity: 0.45; }
    .due-name { font-size: 16px; color: var(--ink); }
    .due-check {
      width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid var(--line);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: transparent; flex-shrink: 0;
    }
    .due-item.sel .due-check { border-color: var(--ink); background: var(--ink); color: var(--bg); }

    /* ── Manage page items ────────────────────────────────────────── */
    .page-item {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 0; border-bottom: 1px solid var(--line); min-height: 44px;
    }
    .page-num-main {
      font-size: 13px; color: var(--ink-2); width: 36px; text-align: right;
      flex-shrink: 0; font-variant-numeric: tabular-nums;
    }
    .page-surah-name { font-size: 15px; font-weight: 500; color: var(--ink); flex-shrink: 0; }
    .page-item-verse {
      font-family: 'Geeza Pro', 'Traditional Arabic', 'Arabic Typesetting', serif;
      font-size: 17px; color: var(--ink); direction: rtl; text-align: right;
      flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .page-meta     { display: flex; align-items: center; gap: 10px; flex-shrink: 0; line-height: 1; }
    .page-due-tag  { font-size: 12px; color: var(--ink-3); line-height: 1; }
    .page-due-now  { font-size: 12px; color: var(--ink); font-weight: 500; line-height: 1; }
    /* Action labels — spans not buttons, avoids browser min-height on rows */
    .retire-btn, .delete-btn, .restore-btn {
      display: inline; font-size: 13px; line-height: 1;
      cursor: pointer; touch-action: manipulation;
      -webkit-user-select: none; user-select: none;
    }
    .retire-btn  { color: var(--ink-3); }
    .delete-btn  { color: var(--ink-3); font-size: 18px; }
    .restore-btn { color: var(--ink-2); }
    .retire-btn:active, .delete-btn:active, .restore-btn:active { color: var(--ink); }
    .page-item.retired-item .page-num-main { color: var(--ink-3); }
    .retired-tag { font-size: 12px; color: var(--ink-3); line-height: 1; }

    /* ── Buttons ──────────────────────────────────────────────────── */
    .btn {
      display: block; width: 100%; min-height: 50px; padding: 14px; border: none;
      border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 10px;
      touch-action: manipulation; -webkit-user-select: none; user-select: none;
    }
    .btn-primary { background: var(--btn); color: var(--btn-txt); }
    .btn-primary:active { opacity: 0.85; }
    .btn-ghost   { background: var(--surface); color: var(--ink-2); font-weight: 500; }
    .btn-ghost:active { opacity: 0.7; }

    /* ── Rating ───────────────────────────────────────────────────── */
    .progress-text { font-size: 13px; color: var(--ink-3); margin-bottom: 36px; text-align: center; }
    .rating-main { text-align: center; margin-bottom: 40px; padding: 0 8px; }
    .rating-surah-name { font-size: 28px; font-weight: 700; color: var(--ink); margin-bottom: 18px; letter-spacing: -0.5px; }
    .rating-arabic {
      font-family: 'Geeza Pro', 'Traditional Arabic', 'Arabic Typesetting', serif;
      font-size: 26px; color: var(--ink); direction: rtl; line-height: 1.9; margin-bottom: 14px;
    }
    .rating-page-lbl { font-size: 13px; color: var(--ink-3); }
    .rating-nav { display: grid; grid-template-columns: 44px 1fr 44px; gap: 10px; align-items: stretch; }
    .rating-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .rating-arrow {
      border: 1.5px solid var(--line); border-radius: 12px; background: var(--surface); color: var(--ink);
      cursor: pointer; touch-action: manipulation; display: flex; align-items: center; justify-content: center;
      -webkit-user-select: none; user-select: none;
    }
    .rating-arrow:active { opacity: 0.72; }
    .rating-arrow:disabled { opacity: 0.28; cursor: default; }
    .r-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
      min-height: 68px; border: 1.5px solid var(--line); border-radius: 12px; background: var(--bg);
      cursor: pointer; touch-action: manipulation; -webkit-user-select: none; user-select: none; padding: 10px 8px;
    }
    .r-btn:active { background: var(--surface); }
    .r-btn.selected { border-color: var(--ink); background: var(--btn); }
    .r-btn.selected .r-label, .r-btn.selected .r-when { color: var(--btn-txt); }
    .r-label { font-size: 15px; font-weight: 600; color: var(--ink); }
    .r-when  { font-size: 12px; color: var(--ink-3); }

    /* ── Surah picker ─────────────────────────────────────────────── */
    .surah-row {
      display: flex; justify-content: space-between; align-items: center;
      height: 50px; border-bottom: 1px solid var(--line);
      cursor: default; touch-action: manipulation;
    }
    .surah-row.tappable { cursor: pointer; }
    .surah-row.tappable:active { opacity: 0.45; }
    .surah-row:last-child { border-bottom: none; }
    .surah-row-left { display: flex; align-items: center; gap: 10px; }
    .surah-row-num  { font-size: 12px; color: var(--ink-3); min-width: 24px; text-align: right; line-height: 1; flex-shrink: 0; }
    .surah-row-name { font-size: 16px; font-weight: 500; color: var(--ink); line-height: 1; }
    .surah-progress { font-size: 13px; color: var(--ink-3); line-height: 1; flex-shrink: 0; }
    .surah-progress.partial { color: var(--ink-2); font-weight: 500; }
    .surah-progress.done    { color: var(--ink); font-weight: 600; }

    /* ── Page picker ──────────────────────────────────────────────── */
    .pick-item {
      display: flex; flex-direction: row; align-items: center; gap: 10px;
      padding: 14px 0; border-bottom: 1px solid var(--line);
      cursor: pointer; touch-action: manipulation; list-style: none;
    }
    .pick-item:active { opacity: 0.45; }
    .pick-check {
      width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid var(--line);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: transparent; flex-shrink: 0;
    }
    .pick-item.checked .pick-check { border-color: var(--ink); background: var(--ink); color: var(--bg); }
    .pick-num { font-size: 13px; color: var(--ink-2); width: 36px; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; }
    .pick-verse {
      font-family: 'Geeza Pro', 'Traditional Arabic', 'Arabic Typesetting', serif;
      font-size: 18px; color: var(--ink); direction: rtl; line-height: 1.4;
      flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      text-align: right;
    }
    .pick-meta { font-size: 12px; color: var(--ink-3); padding-left: 68px; margin-top: -6px; margin-bottom: 4px; }

    /* ── Settings ─────────────────────────────────────────────────── */
    .settings-card { border-bottom: 1px solid var(--line); margin-bottom: 20px; }
    .setting-row   { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--line); }
    .setting-row:last-child { border-bottom: none; }
    .setting-label { font-size: 16px; color: var(--ink); }
    .setting-right { display: flex; align-items: center; gap: 8px; }
    .days-input {
      width: 52px; background: var(--surface); border: none; border-radius: 8px;
      font-size: 16px; font-weight: 600; color: var(--ink); text-align: center; padding: 8px 6px;
      -webkit-appearance: none; appearance: none; outline: none;
    }
    .setting-unit { font-size: 13px; color: var(--ink-3); }
    .theme-toggle {
      width: 50px; height: 30px; border: none; border-radius: 999px; background: var(--surface);
      padding: 3px; cursor: pointer; touch-action: manipulation; display: flex; align-items: center;
    }
    .theme-toggle-knob { width: 24px; height: 24px; border-radius: 50%; background: var(--ink); transition: transform 0.18s ease; }
    .theme-toggle.on .theme-toggle-knob { transform: translateX(20px); }
    .settings-hint { font-size: 13px; color: var(--ink-3); margin-bottom: 24px; line-height: 1.6; }

    /* ── All done / Upcoming ──────────────────────────────────────── */
    .all-done { text-align: center; padding: 72px 0 40px; }
    .all-done .tick     { font-size: 40px; margin-bottom: 16px; }
    .all-done .done-msg { font-size: 20px; font-weight: 600; margin-bottom: 6px; color: var(--ink); }
    .all-done .done-sub { font-size: 14px; color: var(--ink-3); }
    .upcoming-item  { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-bottom: 1px solid var(--line); }
    .upcoming-item:last-child { border-bottom: none; }
    .upcoming-date  { font-size: 15px; color: var(--ink-2); }
    .upcoming-count { font-size: 13px; color: var(--ink-3); }
    .reset-link {
      display: block; text-align: center; margin-top: 56px; padding: 8px;
      font-size: 12px; color: var(--line); cursor: pointer; touch-action: manipulation;
    }

    /* ── Modal ────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: var(--modal-shade);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 100; padding: 0 16px max(20px, env(safe-area-inset-bottom, 20px));
    }
    .modal {
      background: var(--bg); border-radius: 18px 18px 14px 14px;
      padding: 24px 20px 16px; width: 100%; max-width: 480px;
      animation: slideUp 0.18s ease;
    }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-title { font-size: 16px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
    .modal-msg   { font-size: 14px; color: var(--ink-2); margin-bottom: 20px; line-height: 1.5; }
    .modal-actions { display: flex; flex-direction: column; gap: 8px; }
    .modal-confirm {
      width: 100%; min-height: 46px; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; cursor: pointer; touch-action: manipulation;
      background: var(--btn); color: var(--btn-txt);
    }
    .modal-confirm:active { opacity: 0.8; }
    .modal-cancel {
      width: 100%; min-height: 46px; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 500; cursor: pointer; touch-action: manipulation;
      background: var(--surface); color: var(--ink-2);
    }
    .modal-cancel:active { opacity: 0.7; }
  </style>
</head>

  43: "ٱللَّهُ وَلِىُّ ٱلَّذِينَ ءَامَنُوا۟ يُخْرِجُهُم مِّنَ",
  44: "وَإِذْ قَالَ إِبْرَٰهِۦمُ رَبِّ أَرِنِى كَيْفَ",
  45: "وَمَثَلُ ٱلَّذِينَ يُنفِقُونَ أَمْوَٰلَهُمُ ٱبْتِغَآءَ مَرْضَاتِ",
  46: "وَمَآ أَنفَقْتُم مِّن نَّفَقَةٍ أَوْ نَذَرْتُم",
  47: "ٱلَّذِينَ يَأْكُلُونَ ٱلرِّبَوٰا۟ لَا يَقُومُونَ إِلَّا",
  48: "يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُوٓا۟ إِذَا تَدَايَنتُم بِدَيْنٍ",
  49: "۞ وَإِن كُنتُمْ عَلَىٰ سَفَرٍۢ وَلَمْ",
  51: "إِنَّ ٱلَّذِينَ كَفَرُوا۟ لَن تُغْنِىَ عَنْهُمْ",
  52: "ٱلَّذِينَ يَقُولُونَ رَبَّنَآ إِنَّنَآ ءَامَنَّا فَٱغْفِرْ",
  53: "أَلَمْ تَرَ إِلَى ٱلَّذِينَ أُوتُوا۟ نَصِيبًۭا",
  54: "يَوْمَ تَجِدُ كُلُّ نَفْسٍۢ مَّا عَمِلَتْ",
  55: "هُنَالِكَ دَعَا زَكَرِيَّا رَبَّهُۥ ۖ قَالَ",
  56: "وَيُكَلِّمُ ٱلنَّاسَ فِى ٱلْمَهْدِ وَكَهْلًۭا وَمِنَ",
  57: "رَبَّنَآ ءَامَنَّا بِمَآ أَنزَلْتَ وَٱتَّبَعْنَا ٱلرَّسُولَ",
  58: "إِنَّ هَٰذَا لَهُوَ ٱلْقَصَصُ ٱلْحَقُّ ۚ",
  59: "يَٰٓأَهْلَ ٱلْكِتَٰبِ لِمَ تَلْبِسُونَ ٱلْحَقَّ بِٱلْبَٰطِلِ",
  60: "وَإِنَّ مِنْهُمْ لَفَرِيقًۭا يَلْوُۥنَ أَلْسِنَتَهُم بِٱلْكِتَٰبِ",
  61: "قُلْ ءَامَنَّا بِٱللَّهِ وَمَآ أُنزِلَ عَلَيْنَا",
  62: "لَن تَنَالُوا۟ ٱلْبِرَّ حَتَّىٰ تُنفِقُوا۟ مِمَّا",
  63: "وَكَيْفَ تَكْفُرُونَ وَأَنتُمْ تُتْلَىٰ عَلَيْكُمْ ءَايَٰتُ",
  64: "وَلِلَّهِ مَا فِى ٱلسَّمَٰوَٰتِ وَمَا فِى",
  65: "إِنَّ ٱلَّذِينَ كَفَرُوا۟ لَن تُغْنِىَ عَنْهُمْ",
  66: "إِذْ هَمَّت طَّآئِفَتَانِ مِنكُمْ أَن تَفْشَلَا",
  67: "۞ وَسَارِعُوٓا۟ إِلَىٰ مَغْفِرَةٍۢ مِّن رَّبِّكُمْ",
  68: "وَلِيُمَحِّصَ ٱللَّهُ ٱلَّذِينَ ءَامَنُوا۟ وَيَمْحَقَ ٱلْكَٰفِرِينَ",
  69: "يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُوٓا۟ إِن تُطِيعُوا۟ ٱلَّذِينَ",
  70: "ثُمَّ أَنزَلَ عَلَيْكُم مِّنۢ بَعْدِ ٱلْغَمِّ",
  71: "وَلَئِن مُّتُّمْ أَوْ قُتِلْتُمْ لَإِلَى ٱللَّهِ",
  72: "وَمَآ أَصَٰبَكُمْ يَوْمَ ٱلْتَقَى ٱلْجَمْعَانِ فَبِإِذْنِ",
  73: "فَٱنقَلَبُوا۟ بِنِعْمَةٍۢ مِّنَ ٱللَّهِ وَفَضْلٍۢ لَّمْ",
  74: "لَّقَدْ سَمِعَ ٱللَّهُ قَوْلَ ٱلَّذِينَ قَالُوٓا۟",
  75: "وَإِذْ أَخَذَ ٱللَّهُ مِيثَٰقَ ٱلَّذِينَ أُوتُوا۟",
  76: "فَٱسْتَجَابَ لَهُمْ رَبُّهُمْ أَنِّى لَآ أُضِيعُ",
  78: "لِّلرِّجَالِ نَصِيبٌۭ مِّمَّا تَرَكَ ٱلْوَٰلِدَانِ وَٱلْأَقْرَبُونَ",
  79: "۞ وَلَكُمْ نِصْفُ مَا تَرَكَ أَزْوَٰجُكُمْ",
  80: "وَٱلَّٰتِى يَأْتِينَ ٱلْفَٰحِشَةَ مِن نِّسَآئِكُمْ فَٱسْتَشْهِدُوا۟",
  81: "وَإِنْ أَرَدتُّمُ ٱسْتِبْدَالَ زَوْجٍۢ مَّكَانَ زَوْجٍۢ",
  82: "۞ وَٱلْمُحْصَنَٰتُ مِنَ ٱلنِّسَآءِ إِلَّا مَا",
  83: "وَٱللَّهُ يُرِيدُ أَن يَتُوبَ عَلَيْكُمْ وَيُرِيدُ",
  84: "ٱلرِّجَالُ قَوَّٰمُونَ عَلَى ٱلنِّسَآءِ بِمَا فَضَّلَ",
  85: "وَٱلَّذِينَ يُنفِقُونَ أَمْوَٰلَهُمْ رِئَآءَ ٱلنَّاسِ وَلَا",
  86: "وَٱللَّهُ أَعْلَمُ بِأَعْدَآئِكُمْ ۚ وَكَفَىٰ بِٱللَّهِ",
  87: "أُو۟لَٰٓئِكَ ٱلَّذِينَ لَعَنَهُمُ ٱللَّهُ ۖ وَمَن",
  88: "أَلَمْ تَرَ إِلَى ٱلَّذِينَ يَزْعُمُونَ أَنَّهُمْ",
  89: "وَلَوْ أَنَّا كَتَبْنَا عَلَيْهِمْ أَنِ ٱقْتُلُوٓا۟",
  90: "وَمَا لَكُمْ لَا تُقَٰتِلُونَ فِى سَبِيلِ",
  91: "مَّن يُطِعِ ٱلرَّسُولَ فَقَدْ أَطَاعَ ٱللَّهَ",
  92: "ٱللَّهُ لَآ إِلَٰهَ إِلَّا هُوَ ۚ",
  93: "وَمَا كَانَ لِمُؤْمِنٍ أَن يَقْتُلَ مُؤْمِنًا",
  94: "لَّا يَسْتَوِى ٱلْقَٰعِدُونَ مِنَ ٱلْمُؤْمِنِينَ غَيْرُ",
  95: "وَإِذَا كُنتَ فِيهِمْ فَأَقَمْتَ لَهُمُ ٱلصَّلَوٰةَ",
  96: "وَٱسْتَغْفِرِ ٱللَّهَ ۖ إِنَّ ٱللَّهَ كَانَ",
  97: "۞ لَّا خَيْرَ فِى كَثِيرٍۢ مِّن",
  98: "وَٱلَّذِينَ ءَامَنُوا۟ وَعَمِلُوا۟ ٱلصَّٰلِحَٰتِ سَنُدْخِلُهُمْ جَنَّٰتٍۢ",
  99: "وَإِنِ ٱمْرَأَةٌ خَافَتْ مِنۢ بَعْلِهَا نُشُوزًا",
  100: "۞ يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُوا۟ كُونُوا۟ قَوَّٰمِينَ",
  101: "ٱلَّذِينَ يَتَرَبَّصُونَ بِكُمْ فَإِن كَانَ لَكُمْ",
  102: "۞ لَّا يُحِبُّ ٱللَّهُ ٱلْجَهْرَ بِٱلسُّوٓءِ",
  103: "فَبِمَا نَقْضِهِم مِّيثَٰقَهُمْ وَكُفْرِهِم بِـَٔايَٰتِ ٱللَّهِ",
  104: "۞ إِنَّآ أَوْحَيْنَآ إِلَيْكَ كَمَآ أَوْحَيْنَآ",
  105: "يَٰٓأَهْلَ ٱلْكِتَٰبِ لَا تَغْلُوا۟ فِى دِينِكُمْ",
  106: "يَسْتَفْتُونَكَ قُلِ ٱللَّهُ يُفْتِيكُمْ فِى ٱلْكَلَٰلَةِ",
  107: "حُرِّمَتْ عَلَيْكُمُ ٱلْمَيْتَةُ وَٱلدَّمُ وَلَحْمُ ٱلْخِنزِيرِ",
  108: "يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُوٓا۟ إِذَا قُمْتُمْ إِلَى",
  109: "وَٱلَّذِينَ كَفَرُوا۟ وَكَذَّبُوا۟ بِـَٔايَٰتِنَآ أُو۟لَٰٓئِكَ أَصْحَٰبُ",
  110: "وَمِنَ ٱلَّذِينَ قَالُوٓا۟ إِنَّا نَصَٰرَىٰٓ أَخَذْنَا",
  111: "وَقَالَتِ ٱلْيَهُودُ وَٱلنَّصَٰرَىٰ نَحْنُ أَبْنَٰٓؤُا۟ ٱللَّهِ",
  112: "قَالُوا۟ يَٰمُوسَىٰٓ إِنَّا لَن نَّدْخُلَهَآ أَبَدًۭا",
  113: "مِنْ أَجْلِ ذَٰلِكَ كَتَبْنَا عَلَىٰ بَنِىٓ",
  114: "يُرِيدُونَ أَن يَخْرُجُوا۟ مِنَ ٱلنَّارِ وَمَا",
  115: "سَمَّٰعُونَ لِلْكَذِبِ أَكَّٰلُونَ لِلسُّحْتِ ۚ فَإِن",
  116: "وَقَفَّيْنَا عَلَىٰٓ ءَاثَٰرِهِم بِعِيسَى ٱبْنِ مَرْيَمَ",
  117: "۞ يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُوا۟ لَا تَتَّخِذُوا۟",
  118: "وَإِذَا نَادَيْتُمْ إِلَى ٱلصَّلَوٰةِ ٱتَّخَذُوهَا هُزُوًۭا",
  119: "وَلَوْ أَنَّ أَهْلَ ٱلْكِتَٰبِ ءَامَنُوا۟ وَٱتَّقَوْا۟",
  120: "وَحَسِبُوٓا۟ أَلَّا تَكُونَ فِتْنَةٌۭ فَعَمُوا۟ وَصَمُّوا۟",
  121: "قُلْ يَٰٓأَهْلَ ٱلْكِتَٰبِ لَا تَغْلُوا۟ فِى",
  122: "وَإِذَا سَمِعُوا۟ مَآ أُنزِلَ إِلَى ٱلرَّسُولِ",
  123: "يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُوٓا۟ إِنَّمَا ٱلْخَمْرُ وَٱلْمَيْسِرُ",
  124: "أُحِلَّ لَكُمْ صَيْدُ ٱلْبَحْرِ وَطَعَامُهُۥ مَتَٰعًۭا",
  125: "وَإِذَا قِيلَ لَهُمْ تَعَالَوْا۟ إِلَىٰ مَآ",
  126: "۞ يَوْمَ يَجْمَعُ ٱللَّهُ ٱلرُّسُلَ فَيَقُولُ",
  127: "قَالَ عِيسَى ٱبْنُ مَرْيَمَ ٱللَّهُمَّ رَبَّنَآ",
  129: "وَلَوْ جَعَلْنَٰهُ مَلَكًۭا لَّجَعَلْنَٰهُ رَجُلًۭا وَلَلَبَسْنَا",
  130: "قُلْ أَىُّ شَىْءٍ أَكْبَرُ شَهَٰدَةًۭ ۖ",
  131: "بَلْ بَدَا لَهُم مَّا كَانُوا۟ يُخْفُونَ",
  132: "۞ إِنَّمَا يَسْتَجِيبُ ٱلَّذِينَ يَسْمَعُونَ ۘ",
  133: "فَقُطِعَ دَابِرُ ٱلْقَوْمِ ٱلَّذِينَ ظَلَمُوا۟ ۚ",
  134: "وَكَذَٰلِكَ فَتَنَّا بَعْضَهُم بِبَعْضٍۢ لِّيَقُولُوٓا۟ أَهَٰٓؤُلَآءِ",
  135: "وَهُوَ ٱلَّذِى يَتَوَفَّىٰكُم بِٱلَّيْلِ وَيَعْلَمُ مَا",
  136: "وَمَا عَلَى ٱلَّذِينَ يَتَّقُونَ مِنْ حِسَابِهِم",
  137: "۞ وَإِذْ قَالَ إِبْرَٰهِيمُ لِأَبِيهِ ءَازَرَ",
  138: "ٱلَّذِينَ ءَامَنُوا۟ وَلَمْ يَلْبِسُوٓا۟ إِيمَٰنَهُم بِظُلْمٍ",
  139: "وَمَا قَدَرُوا۟ ٱللَّهَ حَقَّ قَدْرِهِۦٓ إِذْ",
  140: "۞ إِنَّ ٱللَّهَ فَالِقُ ٱلْحَبِّ وَٱلنَّوَىٰ",
  141: "ذَٰلِكُمُ ٱللَّهُ رَبُّكُمْ ۖ لَآ إِلَٰهَ",
  142: "۞ وَلَوْ أَنَّنَا نَزَّلْنَآ إِلَيْهِمُ ٱلْمَلَٰٓئِكَةَ",
  143: "وَمَا لَكُمْ أَلَّا تَأْكُلُوا۟ مِمَّا ذُكِرَ",
  144: "فَمَن يُرِدِ ٱللَّهُ أَن يَهْدِيَهُۥ يَشْرَحْ",
  145: "وَلِكُلٍّۢ دَرَجَٰتٌۭ مِّمَّا عَمِلُوا۟ ۚ وَمَا",
  146: "وَقَالُوا۟ هَٰذِهِۦٓ أَنْعَٰمٌۭ وَحَرْثٌ حِجْرٌۭ لَّا",
  147: "ثَمَٰنِيَةَ أَزْوَٰجٍۢ ۖ مِّنَ ٱلضَّأْنِ ٱثْنَيْنِ",
  148: "فَإِن كَذَّبُوكَ فَقُل رَّبُّكُمْ ذُو رَحْمَةٍۢ",
  149: "وَلَا تَقْرَبُوا۟ مَالَ ٱلْيَتِيمِ إِلَّا بِٱلَّتِى",
  150: "هَلْ يَنظُرُونَ إِلَّآ أَن تَأْتِيَهُمُ ٱلْمَلَٰٓئِكَةُ",
  152: "قَالَ مَا مَنَعَكَ أَلَّا تَسْجُدَ إِذْ",
  153: "قَالَا رَبَّنَا ظَلَمْنَآ أَنفُسَنَا وَإِن لَّمْ",
  154: "۞ يَٰبَنِىٓ ءَادَمَ خُذُوا۟ زِينَتَكُمْ عِندَ",
  155: "قَالَ ٱدْخُلُوا۟ فِىٓ أُمَمٍۢ قَدْ خَلَتْ",
  156: "وَنَادَىٰٓ أَصْحَٰبُ ٱلْجَنَّةِ أَصْحَٰبَ ٱلنَّارِ أَن",
  157: "وَلَقَدْ جِئْنَٰهُم بِكِتَٰبٍۢ فَصَّلْنَٰهُ عَلَىٰ عِلْمٍ",
  158: "وَٱلْبَلَدُ ٱلطَّيِّبُ يَخْرُجُ نَبَاتُهُۥ بِإِذْنِ رَبِّهِۦ",
  159: "أُبَلِّغُكُمْ رِسَٰلَٰتِ رَبِّى وَأَنَا۠ لَكُمْ نَاصِحٌ",
  160: "وَٱذْكُرُوٓا۟ إِذْ جَعَلَكُمْ خُلَفَآءَ مِنۢ بَعْدِ",
  161: "وَمَا كَانَ جَوَابَ قَوْمِهِۦٓ إِلَّآ أَن",
  162: "۞ قَالَ ٱلْمَلَأُ ٱلَّذِينَ ٱسْتَكْبَرُوا۟ مِن",
  163: "وَلَوْ أَنَّ أَهْلَ ٱلْقُرَىٰٓ ءَامَنُوا۟ وَٱتَّقَوْا۟",
  164: "حَقِيقٌ عَلَىٰٓ أَن لَّآ أَقُولَ عَلَى",
  165: "قَالُوٓا۟ ءَامَنَّا بِرَبِّ ٱلْعَٰلَمِينَ",
  166: "فَإِذَا جَآءَتْهُمُ ٱلْحَسَنَةُ قَالُوا۟ لَنَا هَٰذِهِۦ",
  167: "وَجَٰوَزْنَا بِبَنِىٓ إِسْرَٰٓءِيلَ ٱلْبَحْرَ فَأَتَوْا۟ عَلَىٰ",
  168: "قَالَ يَٰمُوسَىٰٓ إِنِّى ٱصْطَفَيْتُكَ عَلَى ٱلنَّاسِ",
  169: "وَلَمَّا رَجَعَ مُوسَىٰٓ إِلَىٰ قَوْمِهِۦ غَضْبَٰنَ",
  170: "۞ وَٱكْتُبْ لَنَا فِى هَٰذِهِ ٱلدُّنْيَا",
  171: "وَقَطَّعْنَٰهُمُ ٱثْنَتَىْ عَشْرَةَ أَسْبَاطًا أُمَمًۭا ۚ",
  172: "وَإِذْ قَالَتْ أُمَّةٌۭ مِّنْهُمْ لِمَ تَعِظُونَ",
  173: "۞ وَإِذْ نَتَقْنَا ٱلْجَبَلَ فَوْقَهُمْ كَأَنَّهُۥ",
  174: "وَلَقَدْ ذَرَأْنَا لِجَهَنَّمَ كَثِيرًۭا مِّنَ ٱلْجِنِّ",
  175: "قُل لَّآ أَمْلِكُ لِنَفْسِى نَفْعًۭا وَلَا",
  176: "إِنَّ وَلِۦِّىَ ٱللَّهُ ٱلَّذِى نَزَّلَ ٱلْكِتَٰبَ",
  178: "إِذْ تَسْتَغِيثُونَ رَبَّكُمْ فَٱسْتَجَابَ لَكُمْ أَنِّى",
  179: "فَلَمْ تَقْتُلُوهُمْ وَلَٰكِنَّ ٱللَّهَ قَتَلَهُمْ ۚ",
  180: "وَٱذْكُرُوٓا۟ إِذْ أَنتُمْ قَلِيلٌۭ مُّسْتَضْعَفُونَ فِى",
  181: "وَمَا لَهُمْ أَلَّا يُعَذِّبَهُمُ ٱللَّهُ وَهُمْ",
  182: "۞ وَٱعْلَمُوٓا۟ أَنَّمَا غَنِمْتُم مِّن شَىْءٍۢ",
  183: "وَأَطِيعُوا۟ ٱللَّهَ وَرَسُولَهُۥ وَلَا تَنَٰزَعُوا۟ فَتَفْشَلُوا۟",
  184: "ذَٰلِكَ بِأَنَّ ٱللَّهَ لَمْ يَكُ مُغَيِّرًۭا",
  185: "وَإِن يُرِيدُوٓا۟ أَن يَخْدَعُوكَ فَإِنَّ حَسْبَكَ",
  186: "يَٰٓأَيُّهَا ٱلنَّبِىُّ قُل لِّمَن فِىٓ أَيْدِيكُم",
  188: "كَيْفَ يَكُونُ لِلْمُشْرِكِينَ عَهْدٌ عِندَ ٱللَّهِ",
  189: "قَٰتِلُوهُمْ يُعَذِّبْهُمُ ٱللَّهُ بِأَيْدِيكُمْ وَيُخْزِهِمْ وَيَنصُرْكُمْ",
  190: "يُبَشِّرُهُمْ رَبُّهُم بِرَحْمَةٍۢ مِّنْهُ وَرِضْوَٰنٍۢ وَجَنَّٰتٍۢ",
  191: "ثُمَّ يَتُوبُ ٱللَّهُ مِنۢ بَعْدِ ذَٰلِكَ",
  192: "يُرِيدُونَ أَن يُطْفِـُٔوا۟ نُورَ ٱللَّهِ بِأَفْوَٰهِهِمْ",
  193: "إِنَّمَا ٱلنَّسِىٓءُ زِيَادَةٌۭ فِى ٱلْكُفْرِ ۖ",
  194: "ٱنفِرُوا۟ خِفَافًۭا وَثِقَالًۭا وَجَٰهِدُوا۟ بِأَمْوَٰلِكُمْ وَأَنفُسِكُمْ",
  195: "لَقَدِ ٱبْتَغَوُا۟ ٱلْفِتْنَةَ مِن قَبْلُ وَقَلَّبُوا۟",
  196: "فَلَا تُعْجِبْكَ أَمْوَٰلُهُمْ وَلَآ أَوْلَٰدُهُمْ ۚ",
  197: "يَحْلِفُونَ بِٱللَّهِ لَكُمْ لِيُرْضُوكُمْ وَٱللَّهُ وَرَسُولُهُۥٓ",
  198: "كَٱلَّذِينَ مِن قَبْلِكُمْ كَانُوٓا۟ أَشَدَّ مِنكُمْ",
  199: "يَٰٓأَيُّهَا ٱلنَّبِىُّ جَٰهِدِ ٱلْكُفَّارَ وَٱلْمُنَٰفِقِينَ وَٱغْلُظْ",
  200: "ٱسْتَغْفِرْ لَهُمْ أَوْ لَا تَسْتَغْفِرْ لَهُمْ",
  201: "رَضُوا۟ بِأَن يَكُونُوا۟ مَعَ ٱلْخَوَالِفِ وَطُبِعَ",
  202: "يَعْتَذِرُونَ إِلَيْكُمْ إِذَا رَجَعْتُمْ إِلَيْهِمْ ۚ",
  203: "وَٱلسَّٰبِقُونَ ٱلْأَوَّلُونَ مِنَ ٱلْمُهَٰجِرِينَ وَٱلْأَنصَارِ وَٱلَّذِينَ",
  204: "وَٱلَّذِينَ ٱتَّخَذُوا۟ مَسْجِدًۭا ضِرَارًۭا وَكُفْرًۭا وَتَفْرِيقًۢا",
  205: "ٱلتَّٰٓئِبُونَ ٱلْعَٰبِدُونَ ٱلْحَٰمِدُونَ ٱلسَّٰٓئِحُونَ ٱلرَّٰكِعُونَ ٱلسَّٰجِدُونَ",
  206: "وَعَلَى ٱلثَّلَٰثَةِ ٱلَّذِينَ خُلِّفُوا۟ حَتَّىٰٓ إِذَا",
  207: "يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُوا۟ قَٰتِلُوا۟ ٱلَّذِينَ يَلُونَكُم",
  209: "إِنَّ ٱلَّذِينَ لَا يَرْجُونَ لِقَآءَنَا وَرَضُوا۟",
  210: "وَإِذَا تُتْلَىٰ عَلَيْهِمْ ءَايَاتُنَا بَيِّنَٰتٍۢ ۙ",
  211: "وَإِذَآ أَذَقْنَا ٱلنَّاسَ رَحْمَةًۭ مِّنۢ بَعْدِ",
  212: "۞ لِّلَّذِينَ أَحْسَنُوا۟ ٱلْحُسْنَىٰ وَزِيَادَةٌۭ ۖ",
  213: "قُلْ هَلْ مِن شُرَكَآئِكُم مَّن يَبْدَؤُا۟",
  214: "وَمِنْهُم مَّن يَنظُرُ إِلَيْكَ ۚ أَفَأَنتَ",
  215: "وَلَوْ أَنَّ لِكُلِّ نَفْسٍۢ ظَلَمَتْ مَا",
  216: "أَلَآ إِنَّ أَوْلِيَآءَ ٱللَّهِ لَا خَوْفٌ",
  217: "۞ وَٱتْلُ عَلَيْهِمْ نَبَأَ نُوحٍ إِذْ",
  218: "وَقَالَ فِرْعَوْنُ ٱئْتُونِى بِكُلِّ سَٰحِرٍ عَلِيمٍۢ",
  219: "قَالَ قَدْ أُجِيبَت دَّعْوَتُكُمَا فَٱسْتَقِيمَا وَلَا",
  220: "فَلَوْلَا كَانَتْ قَرْيَةٌ ءَامَنَتْ فَنَفَعَهَآ إِيمَٰنُهَآ",
  221: "وَإِن يَمْسَسْكَ ٱللَّهُ بِضُرٍّۢ فَلَا كَاشِفَ",
  222: "۞ وَمَا مِن دَآبَّةٍۢ فِى ٱلْأَرْضِ",
  223: "أَمْ يَقُولُونَ ٱفْتَرَىٰهُ ۖ قُلْ فَأْتُوا۟",
  224: "أُو۟لَٰٓئِكَ لَمْ يَكُونُوا۟ مُعْجِزِينَ فِى ٱلْأَرْضِ",
  225: "وَيَٰقَوْمِ لَآ أَسْـَٔلُكُمْ عَلَيْهِ مَالًا ۖ",
  226: "وَيَصْنَعُ ٱلْفُلْكَ وَكُلَّمَا مَرَّ عَلَيْهِ مَلَأٌۭ",
  227: "قَالَ يَٰنُوحُ إِنَّهُۥ لَيْسَ مِنْ أَهْلِكَ",
  228: "إِن نَّقُولُ إِلَّا ٱعْتَرَىٰكَ بَعْضُ ءَالِهَتِنَا",
  229: "قَالَ يَٰقَوْمِ أَرَءَيْتُمْ إِن كُنتُ عَلَىٰ",
  230: "قَالَتْ يَٰوَيْلَتَىٰٓ ءَأَلِدُ وَأَنَا۠ عَجُوزٌۭ وَهَٰذَا",
  231: "فَلَمَّا جَآءَ أَمْرُنَا جَعَلْنَا عَٰلِيَهَا سَافِلَهَا",
  232: "وَيَٰقَوْمِ لَا يَجْرِمَنَّكُمْ شِقَاقِىٓ أَن يُصِيبَكُم",
  233: "يَقْدُمُ قَوْمَهُۥ يَوْمَ ٱلْقِيَٰمَةِ فَأَوْرَدَهُمُ ٱلنَّارَ",
  234: "فَلَا تَكُ فِى مِرْيَةٍۢ مِّمَّا يَعْبُدُ",
  235: "وَلَوْ شَآءَ رَبُّكَ لَجَعَلَ ٱلنَّاسَ أُمَّةًۭ",
  236: "قَالَ يَٰبُنَىَّ لَا تَقْصُصْ رُءْيَاكَ عَلَىٰٓ",
  237: "فَلَمَّا ذَهَبُوا۟ بِهِۦ وَأَجْمَعُوٓا۟ أَن يَجْعَلُوهُ",
  238: "وَرَٰوَدَتْهُ ٱلَّتِى هُوَ فِى بَيْتِهَا عَن",
  239: "فَلَمَّا سَمِعَتْ بِمَكْرِهِنَّ أَرْسَلَتْ إِلَيْهِنَّ وَأَعْتَدَتْ",
  240: "وَٱتَّبَعْتُ مِلَّةَ ءَابَآءِىٓ إِبْرَٰهِيمَ وَإِسْحَٰقَ وَيَعْقُوبَ",
  241: "قَالُوٓا۟ أَضْغَٰثُ أَحْلَٰمٍۢ ۖ وَمَا نَحْنُ",
  242: "۞ وَمَآ أُبَرِّئُ نَفْسِىٓ ۚ إِنَّ",
  243: "قَالَ هَلْ ءَامَنُكُمْ عَلَيْهِ إِلَّا كَمَآ",
  244: "فَلَمَّا جَهَّزَهُم بِجَهَازِهِمْ جَعَلَ ٱلسِّقَايَةَ فِى",
  245: "قَالَ مَعَاذَ ٱللَّهِ أَن نَّأْخُذَ إِلَّا",
  246: "يَٰبَنِىَّ ٱذْهَبُوا۟ فَتَحَسَّسُوا۟ مِن يُوسُفَ وَأَخِيهِ",
  247: "فَلَمَّآ أَن جَآءَ ٱلْبَشِيرُ أَلْقَىٰهُ عَلَىٰ",
  248: "وَمَا تَسْـَٔلُهُمْ عَلَيْهِ مِنْ أَجْرٍ ۚ",
  250: "وَيَسْتَعْجِلُونَكَ بِٱلسَّيِّئَةِ قَبْلَ ٱلْحَسَنَةِ وَقَدْ خَلَتْ",
  251: "لَهُۥ دَعْوَةُ ٱلْحَقِّ ۖ وَٱلَّذِينَ يَدْعُونَ",
  252: "۞ أَفَمَن يَعْلَمُ أَنَّمَآ أُنزِلَ إِلَيْكَ",
  253: "ٱلَّذِينَ ءَامَنُوا۟ وَعَمِلُوا۟ ٱلصَّٰلِحَٰتِ طُوبَىٰ لَهُمْ",
  254: "۞ مَّثَلُ ٱلْجَنَّةِ ٱلَّتِى وُعِدَ ٱلْمُتَّقُونَ",
  255: "وَيَقُولُ ٱلَّذِينَ كَفَرُوا۟ لَسْتَ مُرْسَلًۭا ۚ",
  256: "وَإِذْ قَالَ مُوسَىٰ لِقَوْمِهِ ٱذْكُرُوا۟ نِعْمَةَ",
  257: "قَالَتْ لَهُمْ رُسُلُهُمْ إِن نَّحْنُ إِلَّا",
  258: "أَلَمْ تَرَ أَنَّ ٱللَّهَ خَلَقَ ٱلسَّمَٰوَٰتِ",
  259: "تُؤْتِىٓ أُكُلَهَا كُلَّ حِينٍۭ بِإِذْنِ رَبِّهَا",
  260: "وَءَاتَىٰكُم مِّن كُلِّ مَا سَأَلْتُمُوهُ ۚ",
  261: "مُهْطِعِينَ مُقْنِعِى رُءُوسِهِمْ لَا يَرْتَدُّ إِلَيْهِمْ",
  263: "وَلَقَدْ جَعَلْنَا فِى ٱلسَّمَآءِ بُرُوجًۭا وَزَيَّنَّٰهَا",
  264: "قَالَ يَٰٓإِبْلِيسُ مَا لَكَ أَلَّا تَكُونَ",
  265: "إِذْ دَخَلُوا۟ عَلَيْهِ فَقَالُوا۟ سَلَٰمًۭا قَالَ",
  266: "قَالَ هَٰٓؤُلَآءِ بَنَاتِىٓ إِن كُنتُمْ فَٰعِلِينَ",
  267: "ٱلَّذِينَ جَعَلُوا۟ ٱلْقُرْءَانَ عِضِينَ",
  268: "وَتَحْمِلُ أَثْقَالَكُمْ إِلَىٰ بَلَدٍۢ لَّمْ تَكُونُوا۟",
  269: "وَأَلْقَىٰ فِى ٱلْأَرْضِ رَوَٰسِىَ أَن تَمِيدَ",
  270: "ثُمَّ يَوْمَ ٱلْقِيَٰمَةِ يُخْزِيهِمْ وَيَقُولُ أَيْنَ",
  271: "وَقَالَ ٱلَّذِينَ أَشْرَكُوا۟ لَوْ شَآءَ ٱللَّهُ",
  272: "وَمَآ أَرْسَلْنَا مِن قَبْلِكَ إِلَّا رِجَالًۭا",
  273: "لِيَكْفُرُوا۟ بِمَآ ءَاتَيْنَٰهُمْ ۚ فَتَمَتَّعُوا۟ ۖ",
  274: "وَٱللَّهُ أَنزَلَ مِنَ ٱلسَّمَآءِ مَآءًۭ فَأَحْيَا",
  275: "وَيَعْبُدُونَ مِن دُونِ ٱللَّهِ مَا لَا",
  276: "وَٱللَّهُ جَعَلَ لَكُم مِّنۢ بُيُوتِكُمْ سَكَنًۭا",
  277: "ٱلَّذِينَ كَفَرُوا۟ وَصَدُّوا۟ عَن سَبِيلِ ٱللَّهِ",
  278: "وَلَا تَتَّخِذُوٓا۟ أَيْمَٰنَكُمْ دَخَلًۢا بَيْنَكُمْ فَتَزِلَّ",
  279: "وَلَقَدْ نَعْلَمُ أَنَّهُمْ يَقُولُونَ إِنَّمَا يُعَلِّمُهُۥ",
  280: "۞ يَوْمَ تَأْتِى كُلُّ نَفْسٍۢ تُجَٰدِلُ",
  281: "ثُمَّ إِنَّ رَبَّكَ لِلَّذِينَ عَمِلُوا۟ ٱلسُّوٓءَ",
  283: "عَسَىٰ رَبُّكُمْ أَن يَرْحَمَكُمْ ۚ وَإِنْ",
  284: "مَّن كَانَ يُرِيدُ ٱلْعَاجِلَةَ عَجَّلْنَا لَهُۥ",
  285: "وَإِمَّا تُعْرِضَنَّ عَنْهُمُ ٱبْتِغَآءَ رَحْمَةٍۢ مِّن",
  286: "ذَٰلِكَ مِمَّآ أَوْحَىٰٓ إِلَيْكَ رَبُّكَ مِنَ",
  287: "۞ قُلْ كُونُوا۟ حِجَارَةً أَوْ حَدِيدًا",
  288: "وَمَا مَنَعَنَآ أَن نُّرْسِلَ بِٱلْءَايَٰتِ إِلَّآ",
  289: "وَإِذَا مَسَّكُمُ ٱلضُّرُّ فِى ٱلْبَحْرِ ضَلَّ",
  290: "وَإِن كَادُوا۟ لَيَسْتَفِزُّونَكَ مِنَ ٱلْأَرْضِ لِيُخْرِجُوكَ",
  291: "إِلَّا رَحْمَةًۭ مِّن رَّبِّكَ ۚ إِنَّ",
  292: "وَمَن يَهْدِ ٱللَّهُ فَهُوَ ٱلْمُهْتَدِ ۖ",
  293: "وَبِٱلْحَقِّ أَنزَلْنَٰهُ وَبِٱلْحَقِّ نَزَلَ ۗ وَمَآ",
  294: "مَّا لَهُم بِهِۦ مِنْ عِلْمٍۢ وَلَا",
  295: "وَإِذِ ٱعْتَزَلْتُمُوهُمْ وَمَا يَعْبُدُونَ إِلَّا ٱللَّهَ",
  296: "وَكَذَٰلِكَ أَعْثَرْنَا عَلَيْهِمْ لِيَعْلَمُوٓا۟ أَنَّ وَعْدَ",
  297: "وَٱصْبِرْ نَفْسَكَ مَعَ ٱلَّذِينَ يَدْعُونَ رَبَّهُم",
  298: "وَدَخَلَ جَنَّتَهُۥ وَهُوَ ظَالِمٌۭ لِّنَفْسِهِۦ قَالَ",
  299: "ٱلْمَالُ وَٱلْبَنُونَ زِينَةُ ٱلْحَيَوٰةِ ٱلدُّنْيَا ۖ",
  300: "وَلَقَدْ صَرَّفْنَا فِى هَٰذَا ٱلْقُرْءَانِ لِلنَّاسِ",
  301: "فَلَمَّا جَاوَزَا قَالَ لِفَتَىٰهُ ءَاتِنَا غَدَآءَنَا",
  302: "۞ قَالَ أَلَمْ أَقُل لَّكَ إِنَّكَ",
  303: "إِنَّا مَكَّنَّا لَهُۥ فِى ٱلْأَرْضِ وَءَاتَيْنَٰهُ",
  304: "قَالَ هَٰذَا رَحْمَةٌۭ مِّن رَّبِّى ۖ",
  306: "يَٰيَحْيَىٰ خُذِ ٱلْكِتَٰبَ بِقُوَّةٍۢ ۖ وَءَاتَيْنَٰهُ",
  307: "فَكُلِى وَٱشْرَبِى وَقَرِّى عَيْنًۭا ۖ فَإِمَّا",
  308: "وَأَنذِرْهُمْ يَوْمَ ٱلْحَسْرَةِ إِذْ قُضِىَ ٱلْأَمْرُ",
  309: "وَنَٰدَيْنَٰهُ مِن جَانِبِ ٱلطُّورِ ٱلْأَيْمَنِ وَقَرَّبْنَٰهُ",
  310: "رَّبُّ ٱلسَّمَٰوَٰتِ وَٱلْأَرْضِ وَمَا بَيْنَهُمَا فَٱعْبُدْهُ",
  311: "أَفَرَءَيْتَ ٱلَّذِى كَفَرَ بِـَٔايَٰتِنَا وَقَالَ لَأُوتَيَنَّ",
  312: "إِنَّ ٱلَّذِينَ ءَامَنُوا۟ وَعَمِلُوا۟ ٱلصَّٰلِحَٰتِ سَيَجْعَلُ",
  313: "وَأَنَا ٱخْتَرْتُكَ فَٱسْتَمِعْ لِمَا يُوحَىٰٓ",
  314: "إِذْ أَوْحَيْنَآ إِلَىٰٓ أُمِّكَ مَا يُوحَىٰٓ",
  315: "قَالَ عِلْمُهَا عِندَ رَبِّى فِى كِتَٰبٍۢ",
  316: "قَالُوا۟ يَٰمُوسَىٰٓ إِمَّآ أَن تُلْقِىَ وَإِمَّآ",
  317: "وَلَقَدْ أَوْحَيْنَآ إِلَىٰ مُوسَىٰٓ أَنْ أَسْرِ",
  318: "فَأَخْرَجَ لَهُمْ عِجْلًۭا جَسَدًۭا لَّهُۥ خُوَارٌۭ",
  319: "كَذَٰلِكَ نَقُصُّ عَلَيْكَ مِنْ أَنۢبَآءِ مَا",
  320: "فَتَعَٰلَى ٱللَّهُ ٱلْمَلِكُ ٱلْحَقُّ ۗ وَلَا",
  321: "قَالَ كَذَٰلِكَ أَتَتْكَ ءَايَٰتُنَا فَنَسِيتَهَا ۖ",
  323: "وَكَمْ قَصَمْنَا مِن قَرْيَةٍۢ كَانَتْ ظَالِمَةًۭ",
  324: "وَمَآ أَرْسَلْنَا مِن قَبْلِكَ مِن رَّسُولٍ",
  325: "وَإِذَا رَءَاكَ ٱلَّذِينَ كَفَرُوٓا۟ إِن يَتَّخِذُونَكَ",
  326: "قُلْ إِنَّمَآ أُنذِرُكُم بِٱلْوَحْىِ ۚ وَلَا",
  327: "فَجَعَلَهُمْ جُذَٰذًا إِلَّا كَبِيرًۭا لَّهُمْ لَعَلَّهُمْ",
  328: "وَجَعَلْنَٰهُمْ أَئِمَّةًۭ يَهْدُونَ بِأَمْرِنَا وَأَوْحَيْنَآ إِلَيْهِمْ",
  329: "وَمِنَ ٱلشَّيَٰطِينِ مَن يَغُوصُونَ لَهُۥ وَيَعْمَلُونَ",
  330: "وَٱلَّتِىٓ أَحْصَنَتْ فَرْجَهَا فَنَفَخْنَا فِيهَا مِن",
  331: "لَا يَسْمَعُونَ حَسِيسَهَا ۖ وَهُمْ فِى",
  333: "ذَٰلِكَ بِأَنَّ ٱللَّهَ هُوَ ٱلْحَقُّ وَأَنَّهُۥ",
  334: "وَكَذَٰلِكَ أَنزَلْنَٰهُ ءَايَٰتٍۭ بَيِّنَٰتٍۢ وَأَنَّ ٱللَّهَ",
  335: "وَهُدُوٓا۟ إِلَى ٱلطَّيِّبِ مِنَ ٱلْقَوْلِ وَهُدُوٓا۟",
  336: "حُنَفَآءَ لِلَّهِ غَيْرَ مُشْرِكِينَ بِهِۦ ۚ",
  337: "أُذِنَ لِلَّذِينَ يُقَٰتَلُونَ بِأَنَّهُمْ ظُلِمُوا۟ ۚ",
  338: "وَيَسْتَعْجِلُونَكَ بِٱلْعَذَابِ وَلَن يُخْلِفَ ٱللَّهُ وَعْدَهُۥ",
  339: "ٱلْمُلْكُ يَوْمَئِذٍۢ لِّلَّهِ يَحْكُمُ بَيْنَهُمْ ۚ",
  340: "أَلَمْ تَرَ أَنَّ ٱللَّهَ سَخَّرَ لَكُم",
  341: "يَٰٓأَيُّهَا ٱلنَّاسُ ضُرِبَ مَثَلٌۭ فَٱسْتَمِعُوا۟ لَهُۥٓ",
  343: "وَأَنزَلْنَا مِنَ ٱلسَّمَآءِ مَآءًۢ بِقَدَرٍۢ فَأَسْكَنَّٰهُ",
  344: "فَإِذَا ٱسْتَوَيْتَ أَنتَ وَمَن مَّعَكَ عَلَى",
  345: "مَا تَسْبِقُ مِنْ أُمَّةٍ أَجَلَهَا وَمَا",
  346: "وَٱلَّذِينَ يُؤْتُونَ مَآ ءَاتَوا۟ وَّقُلُوبُهُمْ وَجِلَةٌ",
  347: "۞ وَلَوْ رَحِمْنَٰهُمْ وَكَشَفْنَا مَا بِهِم",
  348: "بَلْ أَتَيْنَٰهُم بِٱلْحَقِّ وَإِنَّهُمْ لَكَٰذِبُونَ",
  349: "أَلَمْ تَكُنْ ءَايَٰتِى تُتْلَىٰ عَلَيْكُمْ فَكُنتُم",
  351: "إِنَّ ٱلَّذِينَ جَآءُو بِٱلْإِفْكِ عُصْبَةٌۭ مِّنكُمْ",
  352: "۞ يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُوا۟ لَا تَتَّبِعُوا۟",
  353: "فَإِن لَّمْ تَجِدُوا۟ فِيهَآ أَحَدًۭا فَلَا",
  354: "وَأَنكِحُوا۟ ٱلْأَيَٰمَىٰ مِنكُمْ وَٱلصَّٰلِحِينَ مِنْ عِبَادِكُمْ",
  355: "رِجَالٌۭ لَّا تُلْهِيهِمْ تِجَٰرَةٌۭ وَلَا بَيْعٌ",
  356: "يُقَلِّبُ ٱللَّهُ ٱلَّيْلَ وَٱلنَّهَارَ ۚ إِنَّ",
  357: "قُلْ أَطِيعُوا۟ ٱللَّهَ وَأَطِيعُوا۟ ٱلرَّسُولَ ۖ",
  358: "وَإِذَا بَلَغَ ٱلْأَطْفَٰلُ مِنكُمُ ٱلْحُلُمَ فَلْيَسْتَـْٔذِنُوا۟",
  359: "إِنَّمَا ٱلْمُؤْمِنُونَ ٱلَّذِينَ ءَامَنُوا۟ بِٱللَّهِ وَرَسُولِهِۦ",
  360: "وَٱتَّخَذُوا۟ مِن دُونِهِۦٓ ءَالِهَةًۭ لَّا يَخْلُقُونَ",
  361: "إِذَا رَأَتْهُم مِّن مَّكَانٍۭ بَعِيدٍۢ سَمِعُوا۟",
  362: "۞ وَقَالَ ٱلَّذِينَ لَا يَرْجُونَ لِقَآءَنَا",
  363: "وَلَا يَأْتُونَكَ بِمَثَلٍ إِلَّا جِئْنَٰكَ بِٱلْحَقِّ",
  364: "أَمْ تَحْسَبُ أَنَّ أَكْثَرَهُمْ يَسْمَعُونَ أَوْ",
  365: "وَمَآ أَرْسَلْنَٰكَ إِلَّا مُبَشِّرًۭا وَنَذِيرًۭا",
  366: "وَٱلَّذِينَ لَا يَدْعُونَ مَعَ ٱللَّهِ إِلَٰهًا",
  368: "قَالَ فَعَلْتُهَآ إِذًۭا وَأَنَا۠ مِنَ ٱلضَّآلِّينَ",
  369: "لَعَلَّنَا نَتَّبِعُ ٱلسَّحَرَةَ إِن كَانُوا۟ هُمُ",
  370: "فَلَمَّا تَرَٰٓءَا ٱلْجَمْعَانِ قَالَ أَصْحَٰبُ مُوسَىٰٓ",
  371: "وَٱجْعَل لِّى لِسَانَ صِدْقٍۢ فِى ٱلْءَاخِرِينَ",
  372: "قَالَ وَمَا عِلْمِى بِمَا كَانُوا۟ يَعْمَلُونَ",
  373: "إِنْ هَٰذَآ إِلَّا خُلُقُ ٱلْأَوَّلِينَ",
  374: "كَذَّبَتْ قَوْمُ لُوطٍ ٱلْمُرْسَلِينَ",
  375: "وَٱتَّقُوا۟ ٱلَّذِى خَلَقَكُمْ وَٱلْجِبِلَّةَ ٱلْأَوَّلِينَ",
  376: "مَآ أَغْنَىٰ عَنْهُم مَّا كَانُوا۟ يُمَتَّعُونَ",
  378: "وَجَحَدُوا۟ بِهَا وَٱسْتَيْقَنَتْهَآ أَنفُسُهُمْ ظُلْمًۭا وَعُلُوًّۭا",
  379: "إِنِّى وَجَدتُّ ٱمْرَأَةًۭ تَمْلِكُهُمْ وَأُوتِيَتْ مِن",
  380: "فَلَمَّا جَآءَ سُلَيْمَٰنَ قَالَ أَتُمِدُّونَنِ بِمَالٍۢ",
  381: "وَلَقَدْ أَرْسَلْنَآ إِلَىٰ ثَمُودَ أَخَاهُمْ صَٰلِحًا",
  382: "۞ فَمَا كَانَ جَوَابَ قَوْمِهِۦٓ إِلَّآ",
  383: "أَمَّن يَبْدَؤُا۟ ٱلْخَلْقَ ثُمَّ يُعِيدُهُۥ وَمَن",
  384: "وَإِنَّهُۥ لَهُدًۭى وَرَحْمَةٌۭ لِّلْمُؤْمِنِينَ",
  385: "مَن جَآءَ بِٱلْحَسَنَةِ فَلَهُۥ خَيْرٌۭ مِّنْهَا",
  386: "وَنُمَكِّنَ لَهُمْ فِى ٱلْأَرْضِ وَنُرِىَ فِرْعَوْنَ",
  387: "وَلَمَّا بَلَغَ أَشُدَّهُۥ وَٱسْتَوَىٰٓ ءَاتَيْنَٰهُ حُكْمًۭا",
  388: "وَلَمَّا تَوَجَّهَ تِلْقَآءَ مَدْيَنَ قَالَ عَسَىٰ",
  389: "۞ فَلَمَّا قَضَىٰ مُوسَى ٱلْأَجَلَ وَسَارَ",
  390: "فَلَمَّا جَآءَهُم مُّوسَىٰ بِـَٔايَٰتِنَا بَيِّنَٰتٍۢ قَالُوا۟",
  391: "وَمَا كُنتَ بِجَانِبِ ٱلْغَرْبِىِّ إِذْ قَضَيْنَآ",
  392: "۞ وَلَقَدْ وَصَّلْنَا لَهُمُ ٱلْقَوْلَ لَعَلَّهُمْ",
  393: "وَمَآ أُوتِيتُم مِّن شَىْءٍۢ فَمَتَٰعُ ٱلْحَيَوٰةِ",
  394: "قُلْ أَرَءَيْتُمْ إِن جَعَلَ ٱللَّهُ عَلَيْكُمُ",
  395: "قَالَ إِنَّمَآ أُوتِيتُهُۥ عَلَىٰ عِلْمٍ عِندِىٓ",
  396: "إِنَّ ٱلَّذِى فَرَضَ عَلَيْكَ ٱلْقُرْءَانَ لَرَآدُّكَ",
  397: "وَٱلَّذِينَ ءَامَنُوا۟ وَعَمِلُوا۟ ٱلصَّٰلِحَٰتِ لَنُكَفِّرَنَّ عَنْهُمْ",
  398: "فَأَنجَيْنَٰهُ وَأَصْحَٰبَ ٱلسَّفِينَةِ وَجَعَلْنَٰهَآ ءَايَةًۭ لِّلْعَٰلَمِينَ",
  399: "فَمَا كَانَ جَوَابَ قَوْمِهِۦٓ إِلَّآ أَن",
  400: "وَلَمَّا جَآءَتْ رُسُلُنَآ إِبْرَٰهِيمَ بِٱلْبُشْرَىٰ قَالُوٓا۟",
  401: "وَقَٰرُونَ وَفِرْعَوْنَ وَهَٰمَٰنَ ۖ وَلَقَدْ جَآءَهُم",
  402: "۞ وَلَا تُجَٰدِلُوٓا۟ أَهْلَ ٱلْكِتَٰبِ إِلَّا",
  403: "وَيَسْتَعْجِلُونَكَ بِٱلْعَذَابِ ۚ وَلَوْلَآ أَجَلٌۭ مُّسَمًّۭى",
  404: "وَمَا هَٰذِهِ ٱلْحَيَوٰةُ ٱلدُّنْيَآ إِلَّا لَهْوٌۭ",
  405: "وَعْدَ ٱللَّهِ ۖ لَا يُخْلِفُ ٱللَّهُ",
  406: "وَأَمَّا ٱلَّذِينَ كَفَرُوا۟ وَكَذَّبُوا۟ بِـَٔايَٰتِنَا وَلِقَآئِ",
  407: "وَمِنْ ءَايَٰتِهِۦٓ أَن تَقُومَ ٱلسَّمَآءُ وَٱلْأَرْضُ",
  408: "وَإِذَا مَسَّ ٱلنَّاسَ ضُرٌّۭ دَعَوْا۟ رَبَّهُم",
  409: "قُلْ سِيرُوا۟ فِى ٱلْأَرْضِ فَٱنظُرُوا۟ كَيْفَ",
  410: "وَلَئِنْ أَرْسَلْنَا رِيحًۭا فَرَأَوْهُ مُصْفَرًّۭا لَّظَلُّوا۟",
  412: "وَلَقَدْ ءَاتَيْنَا لُقْمَٰنَ ٱلْحِكْمَةَ أَنِ ٱشْكُرْ",
  413: "أَلَمْ تَرَوْا۟ أَنَّ ٱللَّهَ سَخَّرَ لَكُم",
  414: "أَلَمْ تَرَ أَنَّ ٱللَّهَ يُولِجُ ٱلَّيْلَ",
  416: "وَلَوْ تَرَىٰٓ إِذِ ٱلْمُجْرِمُونَ نَاكِسُوا۟ رُءُوسِهِمْ",
  417: "وَلَنُذِيقَنَّهُم مِّنَ ٱلْعَذَابِ ٱلْأَدْنَىٰ دُونَ ٱلْعَذَابِ",
  419: "وَإِذْ أَخَذْنَا مِنَ ٱلنَّبِيِّۦنَ مِيثَٰقَهُمْ وَمِنكَ",
  420: "قُل لَّن يَنفَعَكُمُ ٱلْفِرَارُ إِن فَرَرْتُم",
  421: "مِّنَ ٱلْمُؤْمِنِينَ رِجَالٌۭ صَدَقُوا۟ مَا عَٰهَدُوا۟",
  422: "۞ وَمَن يَقْنُتْ مِنكُنَّ لِلَّهِ وَرَسُولِهِۦ",
  423: "وَمَا كَانَ لِمُؤْمِنٍۢ وَلَا مُؤْمِنَةٍ إِذَا",
  424: "تَحِيَّتُهُمْ يَوْمَ يَلْقَوْنَهُۥ سَلَٰمٌۭ ۚ وَأَعَدَّ",
  425: "۞ تُرْجِى مَن تَشَآءُ مِنْهُنَّ وَتُـْٔوِىٓ",
  426: "لَّا جُنَاحَ عَلَيْهِنَّ فِىٓ ءَابَآئِهِنَّ وَلَآ",
  427: "يَسْـَٔلُكَ ٱلنَّاسُ عَنِ ٱلسَّاعَةِ ۖ قُلْ",
  429: "أَفْتَرَىٰ عَلَى ٱللَّهِ كَذِبًا أَم بِهِۦ",
  430: "لَقَدْ كَانَ لِسَبَإٍۢ فِى مَسْكَنِهِمْ ءَايَةٌۭ",
  431: "وَلَا تَنفَعُ ٱلشَّفَٰعَةُ عِندَهُۥٓ إِلَّا لِمَنْ",
  432: "قَالَ ٱلَّذِينَ ٱسْتَكْبَرُوا۟ لِلَّذِينَ ٱسْتُضْعِفُوٓا۟ أَنَحْنُ",
  433: "وَيَوْمَ يَحْشُرُهُمْ جَمِيعًۭا ثُمَّ يَقُولُ لِلْمَلَٰٓئِكَةِ",
  434: "قُلْ جَآءَ ٱلْحَقُّ وَمَا يُبْدِئُ ٱلْبَٰطِلُ",
  435: "وَإِن يُكَذِّبُوكَ فَقَدْ كُذِّبَتْ رُسُلٌۭ مِّن",
  436: "وَمَا يَسْتَوِى ٱلْبَحْرَانِ هَٰذَا عَذْبٌۭ فُرَاتٌۭ",
  437: "وَمَا يَسْتَوِى ٱلْأَعْمَىٰ وَٱلْبَصِيرُ",
  438: "وَٱلَّذِىٓ أَوْحَيْنَآ إِلَيْكَ مِنَ ٱلْكِتَٰبِ هُوَ",
  439: "هُوَ ٱلَّذِى جَعَلَكُمْ خَلَٰٓئِفَ فِى ٱلْأَرْضِ",
  440: "وَلَوْ يُؤَاخِذُ ٱللَّهُ ٱلنَّاسَ بِمَا كَسَبُوا۟",
  441: "وَٱضْرِبْ لَهُم مَّثَلًا أَصْحَٰبَ ٱلْقَرْيَةِ إِذْ",
  442: "۞ وَمَآ أَنزَلْنَا عَلَىٰ قَوْمِهِۦ مِنۢ",
  443: "وَءَايَةٌۭ لَّهُمْ أَنَّا حَمَلْنَا ذُرِّيَّتَهُمْ فِى",
  444: "إِنَّ أَصْحَٰبَ ٱلْجَنَّةِ ٱلْيَوْمَ فِى شُغُلٍۢ",
  445: "أَوَلَمْ يَرَوْا۟ أَنَّا خَلَقْنَا لَهُم مِّمَّا",
  447: "مَا لَكُمْ لَا تَنَاصَرُونَ",
  448: "يَقُولُ أَءِنَّكَ لَمِنَ ٱلْمُصَدِّقِينَ",
  449: "وَجَعَلْنَا ذُرِّيَّتَهُۥ هُمُ ٱلْبَاقِينَ",
  450: "فَلَمَّآ أَسْلَمَا وَتَلَّهُۥ لِلْجَبِينِ",
  451: "فَكَذَّبُوهُ فَإِنَّهُمْ لَمُحْضَرُونَ",
  452: "مَا لَكُمْ كَيْفَ تَحْكُمُونَ",
  454: "ٱصْبِرْ عَلَىٰ مَا يَقُولُونَ وَٱذْكُرْ عَبْدَنَا",
  455: "وَمَا خَلَقْنَا ٱلسَّمَآءَ وَٱلْأَرْضَ وَمَا بَيْنَهُمَا",
  456: "وَوَهَبْنَا لَهُۥٓ أَهْلَهُۥ وَمِثْلَهُم مَّعَهُمْ رَحْمَةًۭ",
  457: "وَقَالُوا۟ مَا لَنَا لَا نَرَىٰ رِجَالًۭا",
  458: "قَالَ فَٱلْحَقُّ وَٱلْحَقَّ أَقُولُ",
  459: "خَلَقَكُم مِّن نَّفْسٍۢ وَٰحِدَةٍۢ ثُمَّ جَعَلَ",
  460: "قُلْ إِنِّىٓ أُمِرْتُ أَنْ أَعْبُدَ ٱللَّهَ",
  461: "أَفَمَن شَرَحَ ٱللَّهُ صَدْرَهُۥ لِلْإِسْلَٰمِ فَهُوَ",
  462: "۞ فَمَنْ أَظْلَمُ مِمَّن كَذَبَ عَلَى",
  463: "إِنَّآ أَنزَلْنَا عَلَيْكَ ٱلْكِتَٰبَ لِلنَّاسِ بِٱلْحَقِّ",
  464: "وَبَدَا لَهُمْ سَيِّـَٔاتُ مَا كَسَبُوا۟ وَحَاقَ",
  465: "أَوْ تَقُولَ لَوْ أَنَّ ٱللَّهَ هَدَىٰنِى",
  466: "وَنُفِخَ فِى ٱلصُّورِ فَصَعِقَ مَن فِى",
  467: "وَتَرَى ٱلْمَلَٰٓئِكَةَ حَآفِّينَ مِنْ حَوْلِ ٱلْعَرْشِ",
  468: "رَبَّنَا وَأَدْخِلْهُمْ جَنَّٰتِ عَدْنٍ ٱلَّتِى وَعَدتَّهُمْ",
  469: "ٱلْيَوْمَ تُجْزَىٰ كُلُّ نَفْسٍۭ بِمَا كَسَبَتْ",
  470: "وَقَالَ فِرْعَوْنُ ذَرُونِىٓ أَقْتُلْ مُوسَىٰ وَلْيَدْعُ",
  471: "وَلَقَدْ جَآءَكُمْ يُوسُفُ مِن قَبْلُ بِٱلْبَيِّنَٰتِ",
  472: "۞ وَيَٰقَوْمِ مَا لِىٓ أَدْعُوكُمْ إِلَى",
  473: "قَالُوٓا۟ أَوَلَمْ تَكُ تَأْتِيكُمْ رُسُلُكُم بِٱلْبَيِّنَٰتِ",
  474: "إِنَّ ٱلسَّاعَةَ لَءَاتِيَةٌۭ لَّا رَيْبَ فِيهَا",
  475: "هُوَ ٱلَّذِى خَلَقَكُم مِّن تُرَابٍۢ ثُمَّ",
  476: "وَلَقَدْ أَرْسَلْنَا رُسُلًۭا مِّن قَبْلِكَ مِنْهُم",
  478: "فَقَضَىٰهُنَّ سَبْعَ سَمَٰوَاتٍۢ فِى يَوْمَيْنِ وَأَوْحَىٰ",
  479: "وَقَالُوا۟ لِجُلُودِهِمْ لِمَ شَهِدتُّمْ عَلَيْنَا ۖ",
  480: "إِنَّ ٱلَّذِينَ قَالُوا۟ رَبُّنَا ٱللَّهُ ثُمَّ",
  481: "وَمِنْ ءَايَٰتِهِۦٓ أَنَّكَ تَرَى ٱلْأَرْضَ خَٰشِعَةًۭ",
  482: "۞ إِلَيْهِ يُرَدُّ عِلْمُ ٱلسَّاعَةِ ۚ",
  484: "فَاطِرُ ٱلسَّمَٰوَٰتِ وَٱلْأَرْضِ ۚ جَعَلَ لَكُم",
  485: "وَٱلَّذِينَ يُحَآجُّونَ فِى ٱللَّهِ مِنۢ بَعْدِ",
  486: "ذَٰلِكَ ٱلَّذِى يُبَشِّرُ ٱللَّهُ عِبَادَهُ ٱلَّذِينَ",
  487: "وَمِنْ ءَايَٰتِهِ ٱلْجَوَارِ فِى ٱلْبَحْرِ كَٱلْأَعْلَٰمِ",
  488: "وَتَرَىٰهُمْ يُعْرَضُونَ عَلَيْهَا خَٰشِعِينَ مِنَ ٱلذُّلِّ",
  489: "وَكَذَٰلِكَ أَوْحَيْنَآ إِلَيْكَ رُوحًۭا مِّنْ أَمْرِنَا",
  490: "وَٱلَّذِى نَزَّلَ مِنَ ٱلسَّمَآءِ مَآءًۢ بِقَدَرٍۢ",
  491: "وَكَذَٰلِكَ مَآ أَرْسَلْنَا مِن قَبْلِكَ فِى",
  492: "وَلِبُيُوتِهِمْ أَبْوَٰبًۭا وَسُرُرًا عَلَيْهَا يَتَّكِـُٔونَ",
  493: "وَمَا نُرِيهِم مِّنْ ءَايَةٍ إِلَّا هِىَ",
  494: "وَإِنَّهُۥ لَعِلْمٌۭ لِّلسَّاعَةِ فَلَا تَمْتَرُنَّ بِهَا",
  495: "إِنَّ ٱلْمُجْرِمِينَ فِى عَذَابِ جَهَنَّمَ خَٰلِدُونَ",
  497: "وَأَن لَّا تَعْلُوا۟ عَلَى ٱللَّهِ ۖ",
  498: "إِنَّ يَوْمَ ٱلْفَصْلِ مِيقَٰتُهُمْ أَجْمَعِينَ",
  500: "قُل لِّلَّذِينَ ءَامَنُوا۟ يَغْفِرُوا۟ لِلَّذِينَ لَا",
  501: "أَفَرَءَيْتَ مَنِ ٱتَّخَذَ إِلَٰهَهُۥ هَوَىٰهُ وَأَضَلَّهُ",
  502: "وَبَدَا لَهُمْ سَيِّـَٔاتُ مَا عَمِلُوا۟ وَحَاقَ",
  503: "وَإِذَا حُشِرَ ٱلنَّاسُ كَانُوا۟ لَهُمْ أَعْدَآءًۭ",
  504: "وَوَصَّيْنَا ٱلْإِنسَٰنَ بِوَٰلِدَيْهِ إِحْسَٰنًا ۖ حَمَلَتْهُ",
  505: "۞ وَٱذْكُرْ أَخَا عَادٍ إِذْ أَنذَرَ",
  506: "وَإِذْ صَرَفْنَآ إِلَيْكَ نَفَرًۭا مِّنَ ٱلْجِنِّ",
  508: "إِنَّ ٱللَّهَ يُدْخِلُ ٱلَّذِينَ ءَامَنُوا۟ وَعَمِلُوا۟",
  509: "وَيَقُولُ ٱلَّذِينَ ءَامَنُوا۟ لَوْلَا نُزِّلَتْ سُورَةٌۭ",
  510: "وَلَوْ نَشَآءُ لَأَرَيْنَٰكَهُمْ فَلَعَرَفْتَهُم بِسِيمَٰهُمْ ۚ",
  512: "إِنَّ ٱلَّذِينَ يُبَايِعُونَكَ إِنَّمَا يُبَايِعُونَ ٱللَّهَ",
  513: "قُل لِّلْمُخَلَّفِينَ مِنَ ٱلْأَعْرَابِ سَتُدْعَوْنَ إِلَىٰ",
  514: "وَهُوَ ٱلَّذِى كَفَّ أَيْدِيَهُمْ عَنكُمْ وَأَيْدِيَكُمْ",
  515: "مُّحَمَّدٌۭ رَّسُولُ ٱللَّهِ ۚ وَٱلَّذِينَ مَعَهُۥٓ",
  516: "وَلَوْ أَنَّهُمْ صَبَرُوا۟ حَتَّىٰ تَخْرُجَ إِلَيْهِمْ",
  517: "يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُوا۟ ٱجْتَنِبُوا۟ كَثِيرًۭا مِّنَ",
  519: "وَلَقَدْ خَلَقْنَا ٱلْإِنسَٰنَ وَنَعْلَمُ مَا تُوَسْوِسُ",
  520: "وَكَمْ أَهْلَكْنَا قَبْلَهُم مِّن قَرْنٍ هُمْ",
  521: "وَٱلسَّمَآءِ ذَاتِ ٱلْحُبُكِ",
  522: "۞ قَالَ فَمَا خَطْبُكُمْ أَيُّهَا ٱلْمُرْسَلُونَ",
  523: "كَذَٰلِكَ مَآ أَتَى ٱلَّذِينَ مِن قَبْلِهِم",
  524: "أَفَسِحْرٌ هَٰذَآ أَمْ أَنتُمْ لَا تُبْصِرُونَ",
  525: "أَمْ تَأْمُرُهُمْ أَحْلَٰمُهُم بِهَٰذَآ ۚ أَمْ",
  527: "إِنَّ ٱلَّذِينَ لَا يُؤْمِنُونَ بِٱلْءَاخِرَةِ لَيُسَمُّونَ",
  528: "وَأَنَّهُۥ خَلَقَ ٱلزَّوْجَيْنِ ٱلذَّكَرَ وَٱلْأُنثَىٰ",
  529: "خُشَّعًا أَبْصَٰرُهُمْ يَخْرُجُونَ مِنَ ٱلْأَجْدَاثِ كَأَنَّهُمْ",
  530: "وَنَبِّئْهُمْ أَنَّ ٱلْمَآءَ قِسْمَةٌۢ بَيْنَهُمْ ۖ",
  531: "وَمَآ أَمْرُنَآ إِلَّا وَٰحِدَةٌۭ كَلَمْحٍۭ بِٱلْبَصَرِ",
  532: "رَبُّ ٱلْمَشْرِقَيْنِ وَرَبُّ ٱلْمَغْرِبَيْنِ",
  533: "يُعْرَفُ ٱلْمُجْرِمُونَ بِسِيمَٰهُمْ فَيُؤْخَذُ بِٱلنَّوَٰصِى وَٱلْأَقْدَامِ",
  534: "فِيهِمَا فَٰكِهَةٌۭ وَنَخْلٌۭ وَرُمَّانٌۭ",
  535: "يَطُوفُ عَلَيْهِمْ وِلْدَٰنٌۭ مُّخَلَّدُونَ",
  536: "ثُمَّ إِنَّكُمْ أَيُّهَا ٱلضَّآلُّونَ ٱلْمُكَذِّبُونَ",
  537: "إِنَّهُۥ لَقُرْءَانٌۭ كَرِيمٌۭ",
  538: "هُوَ ٱلَّذِى خَلَقَ ٱلسَّمَٰوَٰتِ وَٱلْأَرْضَ فِى",
  539: "يَوْمَ تَرَى ٱلْمُؤْمِنِينَ وَٱلْمُؤْمِنَٰتِ يَسْعَىٰ نُورُهُم",
  540: "وَٱلَّذِينَ ءَامَنُوا۟ بِٱللَّهِ وَرُسُلِهِۦٓ أُو۟لَٰٓئِكَ هُمُ",
  541: "لَقَدْ أَرْسَلْنَا رُسُلَنَا بِٱلْبَيِّنَٰتِ وَأَنزَلْنَا مَعَهُمُ",
  543: "أَلَمْ تَرَ أَنَّ ٱللَّهَ يَعْلَمُ مَا",
  544: "يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُوٓا۟ إِذَا نَٰجَيْتُمُ ٱلرَّسُولَ",
  545: "لَّا تَجِدُ قَوْمًۭا يُؤْمِنُونَ بِٱللَّهِ وَٱلْيَوْمِ",
  546: "ذَٰلِكَ بِأَنَّهُمْ شَآقُّوا۟ ٱللَّهَ وَرَسُولَهُۥ ۖ",
  547: "وَٱلَّذِينَ جَآءُو مِنۢ بَعْدِهِمْ يَقُولُونَ رَبَّنَا",
  548: "فَكَانَ عَٰقِبَتَهُمَآ أَنَّهُمَا فِى ٱلنَّارِ خَٰلِدَيْنِ",
  550: "لَقَدْ كَانَ لَكُمْ فِيهِمْ أُسْوَةٌ حَسَنَةٌۭ",

// Page → surahs that start on it
const PAGE_SURAH_STARTS = {};
for (const [n, sp] of Object.entries(SURAH_STARTS)) {
  if (!PAGE_SURAH_STARTS[sp]) PAGE_SURAH_STARTS[sp] = [];
  PAGE_SURAH_STARTS[sp].push(parseInt(n));
}

const SURAH_SORTED = Object.entries(SURAH_STARTS).map(([n,s])=>({num:parseInt(n),start:s})).sort((a,b)=>a.start!==b.start?a.start-b.start:a.num-b.num);

function getJuz(p)    { for(let i=JUZ_STARTS.length-1;i>=0;i--)if(p>=JUZ_STARTS[i])return i+1; return 1; }
function getSurah(p)  { let b=SURAH_SORTED[0]; for(const s of SURAH_SORTED){if(s.start<=p)b=s;else break;} return b.num; }
function getSurahPages(n){
  const s=SURAH_STARTS[n];
  // If the next surah starts on the same page, this surah only occupies that one page
  if(SURAH_STARTS[n+1]===s) return [s];
  const nx=Object.values(SURAH_STARTS).filter(p=>p>s).sort((a,b)=>a-b)[0];
  const e=nx?nx-1:604;
  return Array.from({length:e-s+1},(_,i)=>s+i);
}
function surahsByJuz(){ const g={}; for(let s=1;s<=114;s++){const j=getJuz(SURAH_STARTS[s]);if(!g[j])g[j]=[];g[j].push(s);} return g; }
function getPageVerse(p, targetSurah=null){
  const starts=PAGE_SURAH_STARTS[p];
  if(starts&&starts.length){
    // If picking for a specific surah and it starts here, use that surah's verse
    if(targetSurah&&starts.includes(targetSurah))return FIRST_VERSE[targetSurah]||null;
    return FIRST_VERSE[starts[0]]||null;
  }
  return PAGE_CONTINUATION_VERSE[p]||null;
}

function pageSection(p){const starts=PAGE_SURAH_STARTS[p];return starts&&starts.length?Math.min(...starts):getSurah(p);}
function groupPages(pages){ const g={}; for(const p of pages){const j=getJuz(p),s=pageSection(p);if(!g[j])g[j]={};if(!g[j][s])g[j][s]=[];g[j][s].push(p);} return g; }
function sectionLabel(sectionKey,pages){const all=new Set();for(const p of pages){const st=PAGE_SURAH_STARTS[p];if(st&&st.length)st.forEach(s=>all.add(s));else all.add(sectionKey);}return[...all].sort((a,b)=>a-b).map(s=>SURAH_NAMES[s]).join(' · ');}

// Short surah = multiple surahs share its start page (e.g. Al-Ikhlas, Al-Falaq, An-Nas all on page 604)
function isShortSurah(s){ return (PAGE_SURAH_STARTS[SURAH_STARTS[s]]||[]).length>1; }
// Surahs shorter than 3 pages are reviewed as one surah-level card instead of page-by-page.
function isSurahCard(s){ return getSurahPages(s).length<3; }
function isWholeSurahMemorized(s,pages=S.pages){const sp=getSurahPages(s);return sp.length>0&&sp.every(p=>pages.includes(p));}
function getMemorizedShortSurahs(pages){ const r=new Set(); for(const p of pages) for(const s of (PAGE_SURAH_STARTS[p]||[])) if(isShortSurah(s))r.add(s); return[...r]; }

function buildRatingQueue(duePages) {
  const queue = [], seenSurahs = new Set();
  for (const p of duePages) {
    const starts = PAGE_SURAH_STARTS[p] || [];
    const here = starts.filter(s=>isWholeSurahMemorized(s));
    if (here.length>0) {
      here.forEach(s=>{
        if(!isSurahCard(s)||seenSurahs.has(s))return;
        if(S.retiredSurahs.has(s)||!S.surahCards[s])return;
        seenSurahs.add(s);
        queue.push({page:SURAH_STARTS[s],surah:s,cardType:'surah'});
      });
      if(here.some(s=>isSurahCard(s)))continue;
    }
    const s=getSurah(p);
    if(isSurahCard(s)&&isWholeSurahMemorized(s)){
      if(!seenSurahs.has(s)&&!S.retiredSurahs.has(s)&&S.surahCards[s]){
        seenSurahs.add(s);
        queue.push({page:SURAH_STARTS[s],surah:s,cardType:'surah'});
      }
    } else {
      queue.push({page:p,surah:s,cardType:'page'});
    }
  }
  return queue;
}

// ─── Storage ──────────────────────────────────────────────────────────────────
const KEY_CARDS='hifdh_v1', KEY_PAGES='hifdh_pages', KEY_SETTINGS='hifdh_settings', KEY_RETIRED='hifdh_retired';
const KEY_SURAH_CARDS='hifdh_surah_v1', KEY_SURAH_RETIRED='hifdh_surah_retired', KEY_SURAH_REMOVED='hifdh_surah_removed';
const DEFAULT_PAGES=[];
const DEFAULT_SETTINGS={forgotDays:1,struggledDays:3,easyDays:10,darkMode:false};

const loadSettings=()=>{
  const r=localStorage.getItem(KEY_SETTINGS);
  const raw=r?JSON.parse(r):{};
  if(raw.struggledDays===undefined&&raw.hardDays!==undefined)raw.struggledDays=raw.hardDays;
  return {...DEFAULT_SETTINGS,...raw};
};
const saveSettings=s=>localStorage.setItem(KEY_SETTINGS,JSON.stringify(s));
const loadPages=()=>{const r=localStorage.getItem(KEY_PAGES);if(r)return JSON.parse(r);const p=[...DEFAULT_PAGES];localStorage.setItem(KEY_PAGES,JSON.stringify(p));return p;};
const savePages=p=>localStorage.setItem(KEY_PAGES,JSON.stringify([...p].sort((a,b)=>a-b)));
const loadCards=()=>{const r=localStorage.getItem(KEY_CARDS);return r?JSON.parse(r):{};};
const saveCards=c=>localStorage.setItem(KEY_CARDS,JSON.stringify(c));
const loadRetired=()=>{const r=localStorage.getItem(KEY_RETIRED);return r?new Set(JSON.parse(r)):new Set();};
const saveRetired=()=>localStorage.setItem(KEY_RETIRED,JSON.stringify([...S.retired]));
const loadSurahCards=()=>{const r=localStorage.getItem(KEY_SURAH_CARDS);return r?JSON.parse(r):{};};
const saveSurahCards=c=>localStorage.setItem(KEY_SURAH_CARDS,JSON.stringify(c));
const loadSurahRetired=()=>{const r=localStorage.getItem(KEY_SURAH_RETIRED);return r?new Set(JSON.parse(r)):new Set();};
const saveSurahRetired=()=>localStorage.setItem(KEY_SURAH_RETIRED,JSON.stringify([...S.retiredSurahs]));
const loadRemovedSurahs=()=>{const r=localStorage.getItem(KEY_SURAH_REMOVED);return r?new Set(JSON.parse(r)):new Set();};
const saveRemovedSurahs=()=>localStorage.setItem(KEY_SURAH_REMOVED,JSON.stringify([...S.removedSurahs]));

function ensureCards(cards,pages){const t=today();let ch=false;for(const p of pages){if(!cards[p]){cards[p]={interval:0,ease:2.5,reps:0,due:t};ch=true;}}if(ch)saveCards(cards);return cards;}
// Only creates cards for explicitly listed surahs — never auto-discovers from shared pages
function ensureSurahCards(cards,pages,explicit=[]){const t=today();let ch=false;for(const s of explicit){if(!cards[s]&&!S.removedSurahs.has(s)){cards[s]={interval:0,ease:2.5,reps:0,due:t};ch=true;}}if(ch)saveSurahCards(cards);return cards;}
function ensureCompactSurahCards(cards,pages){
  let ch=false;
  for(let s=1;s<=114;s++){
    if(!isSurahCard(s)||!isWholeSurahMemorized(s,pages)||S.removedSurahs.has(s))continue;
    if(!cards[s]){
      const pageCards=getSurahPages(s).map(p=>S.cards[p]).filter(Boolean);
      const due=pageCards.map(c=>c.due).filter(Boolean).sort()[0]||today();
      cards[s]={interval:0,ease:2.5,reps:0,due};
      ch=true;
    }
  }
  if(ch)saveSurahCards(cards);
  return cards;
}

function getDue(cards,pages){
  const t=today(), due=[], seenSurahs=new Set();
  for(const p of pages){
    if(S.retired.has(p))continue;
    const starts=PAGE_SURAH_STARTS[p]||[];
    const surahStarts=starts.filter(s=>isSurahCard(s)&&isWholeSurahMemorized(s,pages));
    if(surahStarts.length){
      for(const s of surahStarts){
        if(!seenSurahs.has(s)&&!S.retiredSurahs.has(s)&&S.surahCards[s]&&S.surahCards[s].due<=t){
          seenSurahs.add(s);
          due.push(SURAH_STARTS[s]);
        }
      }
      continue;
    }
    const s=getSurah(p);
    if(isSurahCard(s)&&isWholeSurahMemorized(s,pages)){
      if(!seenSurahs.has(s)&&!S.retiredSurahs.has(s)&&S.surahCards[s]&&S.surahCards[s].due<=t){
        seenSurahs.add(s);
        due.push(SURAH_STARTS[s]);
      }
      continue;
    }
    if(cards[p]&&cards[p].due<=t)due.push(p);
  }
  return due;
}

function getUpcoming(){
  const upcoming={}, seenSurahs=new Set();
  const add=d=>{if(d){if(!upcoming[d])upcoming[d]=0;upcoming[d]++;}};
  for(const p of S.pages){
    if(S.retired.has(p))continue;
    const starts=PAGE_SURAH_STARTS[p]||[];
    const compactStarts=starts.filter(s=>isSurahCard(s)&&isWholeSurahMemorized(s));
    if(compactStarts.length){
      compactStarts.forEach(s=>{if(!seenSurahs.has(s)&&!S.retiredSurahs.has(s)){seenSurahs.add(s);add(S.surahCards[s]?.due);}});
      continue;
    }
    const s=getSurah(p);
    if(isSurahCard(s)&&isWholeSurahMemorized(s)){
      if(!seenSurahs.has(s)&&!S.retiredSurahs.has(s)){seenSurahs.add(s);add(S.surahCards[s]?.due);}
      continue;
    }
    add(S.cards[p]?.due);
  }
  return upcoming;
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function today(){const d=new Date();const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');const day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`;}
function addDays(ds,n){const d=new Date(ds+'T00:00:00');d.setDate(d.getDate()+n);const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');const day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`;}
function intervalLabel(days){if(days<=1)return'Tomorrow';if(days<7)return`${days} days`;if(days===7)return'1 week';if(days<14)return`${days} days`;if(days<30)return`${Math.round(days/7)} weeks`;if(days<60)return'1 month';return`${Math.round(days/30)} months`;}
function settingIntervalLabel(days){return `${days} day${days===1?'':'s'}`;}

function calcInterval(card,rating,settings){
  let{ease,reps}=card;
  if(rating===1)return{interval:settings.forgotDays,ease:Math.max(1.3,ease-0.2),reps:0};
  const interval=rating===2?settings.struggledDays:settings.easyDays;
  const ne=rating===2?Math.max(1.3,ease-0.15):Math.min(3.0,ease+0.1);
  return{interval,ease:ne,reps:reps+1};
}
function applyRating(card,rating,settings,reviewed=today()){const r=calcInterval(card,rating,settings);return{...r,due:addDays(reviewed,r.interval),lastReviewed:reviewed};}
function previewLabels(_card,settings){return{1:settingIntervalLabel(settings.forgotDays),2:settingIntervalLabel(settings.struggledDays),3:settingIntervalLabel(settings.easyDays)};}

// ─── State ────────────────────────────────────────────────────────────────────
const S={
  screen:'home', pages:loadPages(), cards:{}, settings:loadSettings(), retired:loadRetired(),
  surahCards:{}, retiredSurahs:loadSurahRetired(), removedSurahs:loadRemovedSurahs(),
  ratingQueue:[], ratingIdx:0, ratingDate:null, pageRatings:{}, surahRatings:{}, ratingHistory:[], pendingRating:null, moreScrollY:0, openJuzs:new Set(),
  selectMode:false, selectedForRating:new Set(),
  selectedSurah:null, selection:new Set(),
};
S.cards=ensureCards(loadCards(),S.pages);
S.surahCards=loadSurahCards(); // Cards are created only when explicitly added, never auto-discovered
S.surahCards=ensureCompactSurahCards(S.surahCards,S.pages);

// ─── Actions ──────────────────────────────────────────────────────────────────
function goHome()        {S.screen='home';     S.selectMode=false; S.selectedForRating=new Set(); render();}
function goMore()        {S.screen='more';     render();}
function goSurahPicker() {S.screen='surahPicker'; render();}
function openSurah(n){
  const sp=getSurahPages(n);
  if(sp.length===1){
    const p=sp[0];
    if(isSurahCard(n)){
      // Compact surah card — add only (removal is via × button)
      if(!S.pages.includes(p)){S.pages=[...S.pages,p].sort((a,b)=>a-b);savePages(S.pages);}
      S.removedSurahs.delete(n);saveRemovedSurahs();
      S.cards=ensureCards(S.cards,S.pages);S.surahCards=ensureSurahCards(S.surahCards,S.pages,[n]);
      saveCards(S.cards);saveSurahCards(S.surahCards);render();
    } else if(S.pages.includes(p)){
      showModal(`Remove ${SURAH_NAMES[n]}?`,`Page ${p} will be removed from your revision list.`,'Remove',true,()=>{
        S.pages=S.pages.filter(x=>x!==p);savePages(S.pages);render();
      });
    } else {
      S.pages=[...S.pages,p].sort((a,b)=>a-b);S.cards=ensureCards(S.cards,S.pages);
      savePages(S.pages);saveCards(S.cards);render();
    }
  } else {
    S.moreScrollY=window.scrollY;
    S.selectedSurah=n;S.selection=new Set(sp.filter(p=>S.pages.includes(p)));S.screen='pagePicker';render();
  }
}
function applyTheme(){
  document.body.classList.toggle('dark',!!S.settings.darkMode);
  document.querySelector('meta[name="theme-color"]').setAttribute('content',S.settings.darkMode?'#17130f':'#f5f1eb');
}
function autoSaveSetting(key,val){S.settings[key]=Math.max(1,parseInt(val)||1);saveSettings(S.settings);}
function toggleDarkMode(){S.settings.darkMode=!S.settings.darkMode;saveSettings(S.settings);applyTheme();render();}

function toggleSelectMode(){S.selectMode=!S.selectMode;S.selectedForRating=new Set();render();}
function toggleSelectPage(p){S.selectedForRating.has(p)?S.selectedForRating.delete(p):S.selectedForRating.add(p);render();}

function startRating(pagesToRate=null){
  const due=pagesToRate||getDue(S.cards,S.pages);
  S.ratingQueue=buildRatingQueue(due);
  S.ratingIdx=0;S.ratingDate=today();S.pageRatings={};S.surahRatings={};S.ratingHistory=[];S.pendingRating=null;
  S.selectMode=false;S.selectedForRating=new Set();
  S.screen='rating';render();
}
function goBackFromRating(){
  if(S.ratingIdx>0){undoLastRating();render();return;}
  exitRating();
}
function previousRating(){
  if(S.ratingIdx>0){undoLastRating();render();}
}
function exitRating(){
  S.screen='home'; S.ratingQueue=[]; S.ratingIdx=0; S.ratingDate=null; S.pageRatings={}; S.surahRatings={}; S.ratingHistory=[]; S.pendingRating=null; render();
}
function startRatingSingle(p){
  S.ratingQueue=buildRatingQueue([p]);
  S.ratingIdx=0;S.ratingDate=today();S.pageRatings={};S.surahRatings={};S.ratingHistory=[];S.pendingRating=null;
  S.selectMode=false;
  S.screen='rating';render();
}

function selectRating(r){S.pendingRating=r;render();}
function nextRating(){if(!S.pendingRating)return;rate(S.pendingRating);}
function rate(r){
  const item=S.ratingQueue[S.ratingIdx];
  S.ratingHistory.push({
    item:{...item}, rating:r,
    previous:item.cardType==='surah'?{...S.surahCards[item.surah]}:{...S.cards[item.page]}
  });
  if(item.cardType==='surah'){
    if(!S.surahRatings[item.surah])S.surahRatings[item.surah]=[];
    S.surahRatings[item.surah].push(r);
    S.surahCards[item.surah]=applyRating(S.surahCards[item.surah],r,S.settings,S.ratingDate||today());
    saveSurahCards(S.surahCards);
  } else {
    if(!S.pageRatings[item.page])S.pageRatings[item.page]=[];
    S.pageRatings[item.page].push(r);
    S.cards[item.page]=applyRating(S.cards[item.page],r,S.settings,S.ratingDate||today());
    saveCards(S.cards);
  }
  S.ratingIdx++;
  S.pendingRating=null;
  if(S.ratingIdx>=S.ratingQueue.length)S.screen='done';
  render();
}

function undoLastRating(){
  const h=S.ratingHistory.pop();
  if(!h)return;
  if(h.item.cardType==='surah'){
    S.surahCards[h.item.surah]=h.previous;
    if(S.surahRatings[h.item.surah]){S.surahRatings[h.item.surah].pop();if(!S.surahRatings[h.item.surah].length)delete S.surahRatings[h.item.surah];}
    saveSurahCards(S.surahCards);
  } else {
    S.cards[h.item.page]=h.previous;
    if(S.pageRatings[h.item.page]){S.pageRatings[h.item.page].pop();if(!S.pageRatings[h.item.page].length)delete S.pageRatings[h.item.page];}
    saveCards(S.cards);
  }
  S.ratingIdx=Math.max(0,S.ratingIdx-1);
  S.pendingRating=h.rating;
  S.screen='rating';
}

function togglePage(p){S.selection.has(p)?S.selection.delete(p):S.selection.add(p);render();}
function savePagePicker(){
  const sp=getSurahPages(S.selectedSurah);
  S.pages=[...S.pages.filter(p=>!sp.includes(p)),...Array.from(S.selection)].sort((a,b)=>a-b);
  S.cards=ensureCards(S.cards,S.pages);
  // Compact surahs get one surah-level card once the whole surah is selected
  if(isSurahCard(S.selectedSurah)&&isWholeSurahMemorized(S.selectedSurah,S.pages)){
    S.removedSurahs.delete(S.selectedSurah);saveRemovedSurahs();
    S.surahCards=ensureSurahCards(S.surahCards,S.pages,[S.selectedSurah]);
  }
  S.surahCards=ensureCompactSurahCards(S.surahCards,S.pages);
  savePages(S.pages);saveCards(S.cards);saveSurahCards(S.surahCards);S.screen='more';render();
}
function removePage(p){
  showModal(`Remove page ${p}?`,`This page will be deleted from your list entirely.`,'Remove',true,()=>{
    S.pages=S.pages.filter(x=>x!==p);savePages(S.pages);render();
  });
}
function retirePage(p){
  showModal(`Retire page ${p}?`,`It won't appear in future revisions. You can restore it from the manage screen anytime.`,'Retire',false,()=>{
    S.retired.add(p);saveRetired();render();
  });
}
function unretirePage(p){S.retired.delete(p);saveRetired();render();}
function retireSurah(s){
  showModal(`Retire ${SURAH_NAMES[s]}?`,`It won't appear in future revisions. Restore it from the manage screen anytime.`,'Retire',false,()=>{
    S.retiredSurahs.add(s);saveSurahRetired();render();
  });
}
function unretireSurah(s){S.retiredSurahs.delete(s);saveSurahRetired();render();}
function retireAllSurahPages(s){
  showModal(`Retire ${SURAH_NAMES[s]}?`,`All pages will be hidden from future revisions.`,'Retire',false,()=>{
    getSurahPages(s).filter(p=>S.pages.includes(p)).forEach(p=>S.retired.add(p));saveRetired();render();
  });
}
function removeAllSurahPages(s){
  showModal(`Remove ${SURAH_NAMES[s]}?`,`All pages will be removed from your list.`,'Remove',true,()=>{
    const mp=getSurahPages(s).filter(p=>S.pages.includes(p));
    S.pages=S.pages.filter(p=>!mp.includes(p));
    if(isSurahCard(s)){delete S.surahCards[s];S.removedSurahs.add(s);saveSurahCards(S.surahCards);saveRemovedSurahs();}
    savePages(S.pages);render();
  });
}
function removeShortSurah(s){
  showModal(`Remove ${SURAH_NAMES[s]}?`,`It will be deleted from your revision list.`,'Remove',true,()=>{
    const pg=SURAH_STARTS[s];
    delete S.surahCards[s];
    S.removedSurahs.add(s);
    saveSurahCards(S.surahCards);
    saveRemovedSurahs();
    // If no tracked short surahs remain on this page, remove the page too
    const remaining=(PAGE_SURAH_STARTS[pg]||[]).filter(x=>S.surahCards[x]&&!S.removedSurahs.has(x));
    if(remaining.length===0){S.pages=S.pages.filter(x=>x!==pg);savePages(S.pages);}
    render();
  });
}


function showModal(title, msg, confirmLabel, _danger, onConfirm){
  const el=document.createElement('div');
  el.className='modal-overlay';
  el.innerHTML=`<div class="modal">
    <p class="modal-title">${title}</p>
    ${msg?`<p class="modal-msg">${msg}</p>`:''}
    <div class="modal-actions">
      <button class="modal-confirm" id="mc-ok">${confirmLabel}</button>
      <button class="modal-cancel" id="mc-cancel">Cancel</button>
    </div>
  </div>`;
  document.body.appendChild(el);
  const close=()=>document.body.removeChild(el);
  el.querySelector('#mc-ok').onclick=()=>{close();onConfirm();};
  el.querySelector('#mc-cancel').onclick=close;
  el.addEventListener('click',e=>{if(e.target===el)close();});
}

function hardReset(){
  showModal('Reset all progress?','This cannot be undone.','Reset',true,()=>{
    [KEY_CARDS,KEY_PAGES,KEY_SETTINGS,KEY_RETIRED,KEY_SURAH_CARDS,KEY_SURAH_RETIRED,KEY_SURAH_REMOVED].forEach(k=>localStorage.removeItem(k));
    S.pages=[...DEFAULT_PAGES];S.settings={...DEFAULT_SETTINGS};S.retired=new Set();S.retiredSurahs=new Set();S.removedSurahs=new Set();
    S.cards=ensureCards({},S.pages);S.surahCards={};saveSurahCards(S.surahCards);S.screen='home';render();
  });
}

// ─── Renderers ────────────────────────────────────────────────────────────────

// Compact overview cards — one per Juz, shows surah names inline
function renderDueOverview(duePages){
  if(!duePages.length)return'';
  const byJuz={};
  for(const p of duePages){const j=getJuz(p);if(!byJuz[j])byJuz[j]=[];byJuz[j].push(p);}
  return Object.keys(byJuz).map(Number).sort((a,b)=>a-b).map(juz=>{
    const pages=byJuz[juz];
    const surahMap={};
    for(const p of pages){
      const starts=PAGE_SURAH_STARTS[p];
      if(starts&&starts.length){
        for(const s of starts){
          // For short surahs (shared page), only include if user has actually tracked this surah
          if(isShortSurah(s)&&(!S.surahCards[s]||S.removedSurahs.has(s)))continue;
          if(!surahMap[s])surahMap[s]=[];surahMap[s].push(p);
        }
      } else{const s=getSurah(p);if(!surahMap[s])surahMap[s]=[];surahMap[s].push(p);}
    }
    // Group consecutive surah numbers into runs, show as "First → Last"
    const surahNums=Object.keys(surahMap).map(Number).sort((a,b)=>a-b);
    const runs=[];let rs=surahNums[0],re=surahNums[0];
    for(let i=1;i<surahNums.length;i++){if(surahNums[i]===re+1){re=surahNums[i];}else{runs.push([rs,re]);rs=re=surahNums[i];}}
    runs.push([rs,re]);
    const lines=[];
    for(const[s,e]of runs){
      if(s===e){
        if(getSurahPages(s).length>4){
          // Long surah — format due pages as consecutive ranges, one line per run
          const pg=[...surahMap[s]].sort((a,b)=>a-b);
          const pgRuns=[];let rs=pg[0],re=pg[0];
          for(let i=1;i<pg.length;i++){if(pg[i]===re+1)re=pg[i];else{pgRuns.push([rs,re]);rs=re=pg[i];}}
          pgRuns.push([rs,re]);
          for(const[ps,pe]of pgRuns)lines.push(`${SURAH_NAMES[s]} - Page ${ps===pe?ps:`${ps} → ${pe}`}`);
        } else {
          lines.push(SURAH_NAMES[s]);
        }
      } else {
        lines.push(`${SURAH_NAMES[s]} → ${SURAH_NAMES[e]}`);
      }
    }
    return`<div class="juz-overview-card" onclick="startRating([${pages.join(',')}])">
      <div class="juz-overview-top">
        <span class="juz-overview-label">Juz ${juz}</span>
        <span class="juz-overview-count">${pages.length} page${pages.length>1?'s':''} ›</span>
      </div>
      <div class="juz-overview-surahs">${lines.join('<br>')}</div>
    </div>`;
  }).join('');
}
